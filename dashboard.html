<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard FLOWS PRO</title>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
  transition: 0.5s;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #1e3c72, #2a5298);
  color: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h2 {
  font-size: 18px;
}

.logout-btn {
  background: white;
  color: #2a5298;
  border: none;
  padding: 8px 15px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.logout-btn:hover {
  transform: scale(1.1);
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  text-align: center;
}

.card h3 {
  margin-bottom: 10px;
}

.value {
  font-size: 26px;
  font-weight: bold;
}

/* CHART */
.chart-card {
  margin-top: 20px;
}

/* ALERT */
#alertBox {
  display: none;
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 25px;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  z-index: 999;
}

/* RESPONSIVE */
@media(max-width:600px){
  .value {
    font-size: 20px;
  }
}

</style>
</head>

<body>

<header>
  <h2>🌊 FLOWS PRO</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div id="alertBox"></div>

<div class="container">

  <div class="grid">
    <div class="card">
      <h3>Tinggi Air</h3>
      <div id="tinggi" class="value">-</div>
    </div>

    <div class="card">
      <h3>Status</h3>
      <div id="status" class="value">-</div>
    </div>

    <div class="card">
      <h3>Water Level</h3>
      <div id="water" class="value">-</div>
    </div>
  </div>

  <div class="card chart-card">
    <h3>Grafik Ketinggian Air</h3>
    <canvas id="chartAir"></canvas>
  </div>

</div>

<!-- AUDIO -->
<audio id="alarmSound">
  <source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>

/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://hceblnmngnnexxtkeiev.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

let chart;

/* ================= UNLOCK AUDIO ================= */
document.body.addEventListener("click", () => {
  let a = document.getElementById("alarmSound");
  a.play().then(() => a.pause());
}, { once: true });

/* ================= CEK LOGIN ================= */
async function checkUser() {
  const { data } = await client.auth.getSession();
  if (!data.session) {
    window.location.href = "login.html";
  }
}
checkUser();

/* ================= LOGOUT ================= */
async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

/* ================= LOAD DATA ================= */
async function loadData() {

  const { data } = await client
    .from("data_air")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(1);

  if (data && data.length > 0) {

    let d = data[0];

    document.getElementById("tinggi").innerText = d.tinggi_air + " cm";
    document.getElementById("status").innerText = d.status;
    document.getElementById("water").innerText = d.water_level;

    let alarm = document.getElementById("alarmSound");
    let alertBox = document.getElementById("alertBox");

    if (d.status === "AMAN") {
      document.body.style.background = "#2ecc71";
      alertBox.style.display = "none";
      alarm.pause();
    }
    else if (d.status === "WASPADA") {
      document.body.style.background = "#f1c40f";

      alertBox.innerText = "⚠️ WASPADA BANJIR";
      alertBox.style.background = "#f39c12";
      alertBox.style.display = "block";

      alarm.play();
    }
    else {
      document.body.style.background = "#e74c3c";

      alertBox.innerText = "🚨 BAHAYA BANJIR!";
      alertBox.style.background = "#c0392b";
      alertBox.style.display = "block";

      alarm.play();
    }
  }
}

/* ================= LOAD CHART ================= */
async function loadChart() {

  const { data } = await client
    .from("data_air")
    .select("*")
    .order("created_at", { ascending: true })
    .limit(10);

  if (data && data.length > 0) {

    let labels = data.map((d, i) => "Data " + (i+1));
    let tinggi = data.map(d => d.tinggi_air);

    if (chart) chart.destroy();

    const ctx = document.getElementById("chartAir").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Tinggi Air (cm)",
          data: tinggi,
          borderWidth: 3,
          fill: false,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            display: true
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

  }
}

/* ================= AUTO UPDATE ================= */
loadData();
loadChart();

setInterval(() => {
  loadData();
  loadChart();
}, 5000);

</script>

</body>
</html>
