<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* ===== SAMA DENGAN INDEX ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #7b2ff7, #00c6ff);
  z-index: 1000;
}

.logo {
  color: white;
  font-size: 26px;
  font-weight: bold;
}

.menu {
  display: flex;
  gap: 25px;
}

.menu a {
  color: white;
  text-decoration: none;
}

.auth {
  display: flex;
  align-items: center;
  gap: 10px;
}

.auth img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

.logout {
  background: white;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== CONTENT ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fa;
}

.container {
  padding: 100px 20px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.value {
  font-size: 24px;
  font-weight: bold;
}

/* ===== MAP ===== */
#map {
  height: 350px;
  margin-top: 20px;
  border-radius: 12px;
}

/* ===== EVAKUASI BUTTON ===== */
.evakuasi-btn {
  margin-top: 10px;
  padding: 10px;
  background: #e74c3c;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- NAVBAR (SAMA PERSIS) -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Monitoring</a>
    <a href="#">Map</a>
  </div>

  <div class="auth">
    <img id="userPhoto">
    <span id="userName" style="color:white;"></span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

<div class="grid">
  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Water</h3>
    <div id="water" class="value">-</div>
  </div>
</div>

<div class="card">
  <h3>Map Monitoring</h3>
  <div id="map"></div>

  <button class="evakuasi-btn" onclick="evakuasi()">
    Cari Rute Evakuasi
  </button>
</div>

</div>

<script>

/* SUPABASE */
const { createClient } = supabase;
const client = createClient(
  "https://hceblnmngnnexxtkeiev.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs"
);

/* USER */
async function loadUser(){
  const { data } = await client.auth.getUser();

  userName.innerText = data.user.user_metadata.full_name;
  userPhoto.src = data.user.user_metadata.avatar_url;
}
loadUser();

/* LOGOUT */
function logout(){
  client.auth.signOut();
  location="login.html";
}

/* MAP */
let map = L.map('map').setView([1.666,101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker;

/* DATA */
async function loadData(){

  let { data } = await client.from("data_air")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(1);

  if(data.length){

    let d=data[0];

    tinggi.innerText=d.tinggi_air+" cm";
    status.innerText=d.status;
    water.innerText=d.water_level;

    if(marker) map.removeLayer(marker);

    marker = L.marker([d.latitude,d.longitude])
      .addTo(map)
      .bindPopup("Lokasi Sensor")
      .openPopup();

    map.setView([d.latitude,d.longitude], 14);
  }
}

/* EVAKUASI (SIMULASI RUTE) */
function evakuasi(){

  navigator.geolocation.getCurrentPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    L.marker([lat,lon]).addTo(map)
      .bindPopup("Lokasi Anda");

    L.polyline([
      [lat,lon],
      [1.670,101.455] /* titik aman contoh */
    ], {color:'red'}).addTo(map);

  });
}

/* LOOP */
setInterval(loadData,5000);
loadData();

</script>

</body>
</html>
