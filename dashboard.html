<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FLOWS PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BOX */
.box {
  width:90%;
  max-width:400px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

.box h2 {
  text-align:center;
  margin-bottom:20px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

.google {
  background:white;
  color:black;
}

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <div class="box">

    <h2>Masuk ke FLOWS-PRO</h2>

    <!-- EMAIL LOGIN -->
    <div class="input-group">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn primary" onclick="loginEmail()">Masuk</button>

    <hr style="margin:20px 0; opacity:0.3;">

    <!-- GOOGLE LOGIN -->
    <button class="btn google" onclick="loginGoogle()">Masuk dengan Google</button>

    <div class="link">
      <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

  </div>
</div>

<script>

/* ===== SUPABASE CONFIG ===== */
const supabase = window.supabase.createClient(
  "https://flows-pro.vercel.app/dashboard.html",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs"
);

/* ===== LOGIN EMAIL ===== */
async function loginEmail(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Login gagal!");
  } else {
    window.location.href = "dashboard.html";
  }
}

/* ===== LOGIN GOOGLE ===== */
async function loginGoogle(){
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/dashboard.html"
    }
  });
}

</script>

</body>
</html>
