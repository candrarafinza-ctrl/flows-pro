<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO Dashboard</title>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ROUTING -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#f4f6f9;
}

/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  width:100%;
  background:linear-gradient(90deg,#7b2ff7,#00c6ff);
  z-index:1000;
}

.navbar-inner{
  max-width:1200px;
  margin:auto;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:white;
  font-size:24px;
  font-weight:bold;
}

/* USER */
.user-box{
  display:flex;
  align-items:center;
  gap:10px;
  color:white;
  cursor:pointer;
  position:relative;
  max-width:220px;
}

.user-box img{
  width:36px;
  height:36px;
  border-radius:50%;
}

.user-box span{
  max-width:150px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:55px;
  right:0;
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  display:none;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* ===== CONTENT ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:110px 25px 30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.value{
  font-size:28px;
  font-weight:bold;
}

.aman{color:#2ecc71;}
.waspada{color:#f39c12;}
.bahaya{color:#e74c3c;}

.progress{
  height:8px;
  background:#eee;
  border-radius:10px;
  margin-top:10px;
}

.progress-bar{
  height:8px;
  width:0%;
  background:#3498db;
  border-radius:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:25px;
}

#map{
  height:350px;
  border-radius:12px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-inner">

    <div class="logo">FLOWS-PRO</div>

    <div class="user-box" onclick="toggleMenu()">
      <img id="userPhoto">
      <span id="userName"></span>

      <div id="dropdown" class="dropdown">
        <div onclick="logout()">Logout</div>
      </div>
    </div>

  </div>
</div>

<!-- CONTENT -->
<div class="container">

<div class="grid">

  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Kondisi</h3>
    <div id="water" class="value">-</div>
  </div>

</div>

<div class="row">

  <div class="card">
    <h3>Grafik Realtime</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Map & Evakuasi</h3>
    <div id="map"></div>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="login.html";
}

userName.innerText = user.name;
userPhoto.src = user.photo;

/* DROPDOWN */
window.toggleMenu = () => {
  dropdown.style.display =
    dropdown.style.display === "block" ? "none" : "block";
};

window.logout = () => {
  localStorage.removeItem("user");
  window.location.href="index.html";
};

/* MAP */
let map = L.map('map').setView([1.666,101.45],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers = [];
let routingControl;

/* CHART */
let chart;

function updateChart(value){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:["Realtime"],
      datasets:[{
        data:[value],
        borderColor:"#00c6ff",
        borderWidth:3
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}

/* ALERT */
function showAlert(status){
  if(status === "BAHAYA"){
    alert("🚨 BAHAYA BANJIR! Segera evakuasi!");
  }
}

/* REALTIME */
onSnapshot(collection(db,"data_air"), (snapshot)=>{

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  snapshot.forEach(doc => {

    let d = doc.data();

    tinggi.innerText = d.tinggi_air + " cm";
    water.innerText = d.status;

    status.innerText = d.status;
    status.className = "value";

    if(d.status=="AMAN") status.classList.add("aman");
    else if(d.status=="WASPADA") status.classList.add("waspada");
    else status.classList.add("bahaya");

    progressBar.style.width = d.tinggi_air + "%";

    updateChart(d.tinggi_air);
    showAlert(d.status);

    let marker = L.marker([d.latitude,d.longitude])
      .addTo(map)
      .bindPopup(`
        <b>${d.nama}</b><br>
        Status: ${d.status}<br>
        ${d.tinggi_air} cm<br><br>
        <button onclick="routeTo(${d.latitude},${d.longitude})">
        Evakuasi
        </button>
      `);

    markers.push(marker);
  });

});

/* ROUTE */
window.routeTo = function(lat,lng){

  let safe = [1.67,101.46];

  if(routingControl) map.removeControl(routingControl);

  routingControl = L.Routing.control({
    waypoints:[
      L.latLng(lat,lng),
      L.latLng(safe[0],safe[1])
    ],
    addWaypoints:false
  }).addTo(map);
};

</script>

</body>
</html>
