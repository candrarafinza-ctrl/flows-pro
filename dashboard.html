<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard FLOWS-PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
  background: #f4f6f9;
}

/* ===== SIDEBAR (TETAP) ===== */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #0d47a1;
  color: white;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 15px 0;
  transition: 0.3s;
}

.sidebar a:hover {
  padding-left: 10px;
}

/* ===== MAIN ===== */
.main {
  margin-left: 220px;
  width: 100%;
}

/* ===== NAVBAR ===== */
.navbar {
  background: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* USER */
.user-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-box img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

/* ===== STATUS ===== */
.status {
  margin: 20px;
  padding: 15px;
  border-radius: 10px;
  color: white;
  text-align: center;
  font-weight: bold;
}

.aman { background: green; }
.waspada { background: orange; }
.bahaya { background: red; }

/* ===== CARDS ===== */
.cards {
  display: flex;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  flex: 1;
  min-width: 200px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.value {
  font-size: 28px;
  font-weight: bold;
}

/* ===== CHART ===== */
.chart-container {
  margin: 20px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .cards { flex-direction: column; }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>FLOWS-PRO</h2>
  <a href="#">Dashboard</a>
  <a href="#">Data Sensor</a>
  <a href="#">Riwayat</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- NAVBAR -->
  <div class="navbar">
    <h3>Dashboard Monitoring</h3>

    <!-- USER (DITAMBAH, TIDAK MENGHAPUS) -->
    <div class="user-box">
      <span id="user">Loading...</span>
      <img id="foto">
    </div>
  </div>

  <!-- STATUS -->
  <div id="statusBox" class="status aman">
    Status: AMAN
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Ketinggian Air</h3>
      <div class="value" id="water">20 cm</div>
    </div>

    <div class="card">
      <h3>Arus Air</h3>
      <div class="value" id="flow">1.2 m/s</div>
    </div>

    <div class="card">
      <h3>Cuaca</h3>
      <div class="value" id="weather">Cerah</div>
    </div>
  </div>

  <!-- CHART -->
  <div class="chart-container">
    <canvas id="myChart"></canvas>
  </div>

</div>

<!-- 🔥 FIREBASE (DITAMBAH SAJA) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  storageBucket: "flows-pro-dc80e.firebasestorage.app",
  messagingSenderId: "1013010002522",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔥 CEK LOGIN */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location = "login.html";
  } else {
    document.getElementById("user").innerText =
      user.displayName || user.email;

    document.getElementById("foto").src =
      user.photoURL || "https://i.imgur.com/6VBx3io.png";
  }
});

/* 🔥 LOGOUT */
window.logout = function(){
  signOut(auth).then(()=>{
    window.location = "index.html";
  });
}
</script>

<!-- 🔥 SCRIPT LAMA (TETAP) -->
<script>
function updateData() {
  let water = Math.floor(Math.random() * 100);
  let flow = (Math.random() * 3).toFixed(2);

  document.getElementById("water").innerText = water + " cm";
  document.getElementById("flow").innerText = flow + " m/s";

  let statusBox = document.getElementById("statusBox");

  if (water < 30) {
    statusBox.className = "status aman";
    statusBox.innerText = "Status: AMAN";
  } else if (water < 70) {
    statusBox.className = "status waspada";
    statusBox.innerText = "Status: WASPADA";
  } else {
    statusBox.className = "status bahaya";
    statusBox.innerText = "Status: BAHAYA";
  }
}

setInterval(updateData, 3000);

/* CHART */
new Chart(document.getElementById('myChart'), {
  type: 'line',
  data: {
    labels: ['1','2','3','4','5'],
    datasets: [{
      label: 'Ketinggian Air',
      data: [10,20,30,25,40],
      borderWidth: 2
    }]
  }
});
</script>

</body>
</html>
