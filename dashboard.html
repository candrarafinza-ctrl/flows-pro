<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard FLOWS PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* HEADER */
header {
  background: linear-gradient(90deg,#1e3c72,#2a5298);
  color: white;
  padding: 15px 20px;
  display:flex;
  justify-content: space-between;
  align-items:center;
}

/* USER */
.user {
  display:flex;
  align-items:center;
  gap:10px;
}

.user img {
  width:40px;
  height:40px;
  border-radius:50%;
}

/* GRID */
.container {
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  text-align:center;
}

.value {
  font-size:24px;
  font-weight:bold;
}

/* MAP */
#map {
  height:350px;
  border-radius:15px;
  margin-top:20px;
}

/* ALERT */
#alertBox {
  display:none;
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  border-radius:10px;
  color:white;
  z-index:999;
}

</style>
</head>

<body>

<header>
  <div>🌊 FLOWS PRO</div>

  <div class="user">
    <img id="userPhoto" src="">
    <span id="userName"></span>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div id="alertBox"></div>

<div class="container">

<div class="grid">
  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Water Level</h3>
    <div id="water" class="value">-</div>
  </div>
</div>

<div class="card">
  <h3>Grafik</h3>
  <canvas id="chart"></canvas>
</div>

<div id="map"></div>

</div>

<audio id="alarm">
  <source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<script>

/* SUPABASE */
const { createClient } = supabase;
const client = createClient(
  "https://hceblnmngnnexxtkeiev.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs"
);

/* USER */
async function loadUser(){
  const { data } = await client.auth.getUser();

  if(!data.user){
    location="login.html";
  }

  document.getElementById("userName").innerText = data.user.user_metadata.full_name;
  document.getElementById("userPhoto").src = data.user.user_metadata.avatar_url;
}
loadUser();

/* LOGOUT */
function logout(){
  client.auth.signOut();
  location="login.html";
}

/* MAP */
let map = L.map('map').setView([1.666,101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker;

/* DATA */
async function loadData(){

  let { data } = await client.from("data_air")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(1);

  if(data.length){

    let d=data[0];

    tinggi.innerText=d.tinggi_air+" cm";
    status.innerText=d.status;
    water.innerText=d.water_level;

    /* MAP UPDATE */
    if(marker) map.removeLayer(marker);

    marker = L.marker([d.latitude, d.longitude])
      .addTo(map)
      .bindPopup("Lokasi Sensor")
      .openPopup();

    map.setView([d.latitude, d.longitude], 14);

    /* NOTIF */
    let alertBox = document.getElementById("alertBox");
    let alarm = document.getElementById("alarm");

    if(d.status=="AMAN"){
      alertBox.style.display="none";
      alarm.pause();
    }
    else{
      alertBox.innerText = d.status;
      alertBox.style.display="block";
      alertBox.style.background="red";
      alarm.play();
    }
  }
}

/* CHART */
let chart;

async function loadChart(){

  let { data } = await client.from("data_air")
    .select("*")
    .limit(10);

  let labels=data.map((_,i)=>i+1);
  let val=data.map(d=>d.tinggi_air);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Tinggi Air",
        data:val,
        borderWidth:3
      }]
    }
  });
}

/* LOOP */
setInterval(()=>{
  loadData();
  loadChart();
},5000);

loadData();
loadChart();

</script>

</body>
</html>
