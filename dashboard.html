<!DOCTYPE html>
<html>
<head>
  <title>Dashboard FLOWS PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #f5f6fa;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #0d47a1;
      color: white;
    }

    .logout {
      background: red;
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .status-box {
      text-align: center;
      margin: 10px;
      padding: 20px;
      border-radius: 15px;
      font-size: 24px;
      font-weight: bold;
      color: white;
    }

    .aman { background: #2ecc71; }
    .waspada { background: #f39c12; }
    .bahaya { background: #e74c3c; }

    .dashboard {
      display: flex;
      gap: 10px;
      padding: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      width: 150px;
      text-align: center;
    }

    #map {
      height: 400px;
      margin: 10px;
      border-radius: 15px;
    }
  </style>
</head>

<body>

<div class="header">
  <div>🌊 FLOWS PRO Dashboard</div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div id="statusBox" class="status-box">Loading...</div>

<div class="dashboard">
  <div class="card">
    <div>Tinggi Air</div>
    <div id="tinggi">-</div>
  </div>

  <div class="card">
    <div>Status</div>
    <div id="status">-</div>
  </div>

  <div class="card">
    <div>Water</div>
    <div id="water">-</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const supabase = window.supabase.createClient(
  "https://hceblnmngnnexxtkeiev.supabase.co",
  "ISI_ANON_KEY_KAMU"
);

// CEK LOGIN
async function checkUser() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) {
    window.location.href = "/";
  }
}

checkUser();

// LOGOUT
function logout() {
  supabase.auth.signOut();
  window.location.href = "/";
}

// MAP
var map = L.map('map').setView([1.666, 101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;

// LOAD DATA
async function loadData() {

  const { data, error } = await supabase
    .from('data_air')
    .select('*')
    .order('id', { ascending: false })
    .limit(1);

  if(data && data.length > 0) {

    let d = data[0];

    document.getElementById("tinggi").innerText = d.tinggi_air + " cm";
    document.getElementById("status").innerText = d.status;
    document.getElementById("water").innerText = d.water_level;

    let box = document.getElementById("statusBox");
    box.className = "status-box";

    let warna = "green";

    if(d.status === "AMAN") {
      box.classList.add("aman");
      box.innerText = "AMAN";
    }
    else if(d.status === "WASPADA") {
      box.classList.add("waspada");
      box.innerText = "WASPADA ⚠️";
      warna = "orange";
    }
    else {
      box.classList.add("bahaya");
      box.innerText = "BAHAYA 🚨";
      warna = "red";
    }

    if(marker) map.removeLayer(marker);

    marker = L.circleMarker([d.latitude, d.longitude], {
      color: warna,
      radius: 12
    }).addTo(map);

  }

}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
