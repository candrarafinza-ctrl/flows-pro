<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* ===== NAVBAR (PUNYA KAMU - TIDAK DIUBAH) ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #7b2ff7, #00c6ff);
  z-index: 1000;
}

.logo {
  color: white;
  font-size: 26px;
  font-weight: bold;
}

.menu {
  display: flex;
  gap: 25px;
}

.menu a {
  color: white;
  text-decoration: none;
}

.auth {
  display: flex;
  align-items: center;
  gap: 10px;
}

.auth img {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial;
  background: #f5f7fa;
}

/* ===== CONTENT ===== */
.container {
  padding: 110px 20px 20px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
}

/* ===== CARD ===== */
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.card h3 {
  margin-bottom: 10px;
  color: #555;
}

.value {
  font-size: 24px;
  font-weight: bold;
}

/* ===== STATUS WARNA ===== */
.aman { color: #2ecc71; }
.waspada { color: #f39c12; }
.bahaya { color: #e74c3c; }

/* ===== CHART + MAP GRID ===== */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 20px;
}

/* ===== MAP ===== */
#map {
  height: 350px;
  border-radius: 12px;
}

/* ===== BUTTON ===== */
.evakuasi-btn {
  margin-top: 10px;
  padding: 10px;
  background: #e74c3c;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== RESPONSIVE ===== */
@media(max-width:800px){
  .row {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a href="#">Dashboard</a>
    <a href="#">Monitoring</a>
    <a href="#">Map</a>
  </div>

  <div class="auth">
    <img id="userPhoto">
    <span id="userName" style="color:white;"></span>
  </div>
</div>

<div class="container">

<!-- DATA -->
<div class="grid">
  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Water</h3>
    <div id="water" class="value">-</div>
  </div>
</div>

<!-- CHART + MAP -->
<div class="row">

  <div class="card">
    <h3>Grafik Ketinggian</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Lokasi Sensor</h3>
    <div id="map"></div>

    <button class="evakuasi-btn" onclick="evakuasi()">
      Rute Evakuasi
    </button>
  </div>

</div>

</div>

<script>

/* SUPABASE */
const { createClient } = supabase;
const client = createClient(
  "https://hceblnmngnnexxtkeiev.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs"
);

/* USER */
async function loadUser(){
  const { data } = await client.auth.getUser();

  userName.innerText = data.user.user_metadata.full_name;
  userPhoto.src = data.user.user_metadata.avatar_url;
}
loadUser();

/* MAP */
let map = L.map('map').setView([1.666,101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker;

/* DATA */
async function loadData(){

  let { data } = await client.from("data_air")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(1);

  if(data.length){

    let d=data[0];

    tinggi.innerText=d.tinggi_air+" cm";
    water.innerText=d.water_level;

    status.innerText=d.status;
    status.className="value";

    if(d.status=="AMAN") status.classList.add("aman");
    else if(d.status=="WASPADA") status.classList.add("waspada");
    else status.classList.add("bahaya");

    if(marker) map.removeLayer(marker);

    marker = L.marker([d.latitude,d.longitude]).addTo(map);

    map.setView([d.latitude,d.longitude],14);
  }
}

/* EVAKUASI */
function evakuasi(){
  navigator.geolocation.getCurrentPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    L.marker([lat,lon]).addTo(map);

    L.polyline([
      [lat,lon],
      [1.670,101.455]
    ], {color:'red'}).addTo(map);

  });
}

/* LOOP */
setInterval(loadData,5000);
loadData();

</script>

</body>
</html>
