<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO Dashboard</title>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ROUTING -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#f4f6f9;
}

/* ================= NAVBAR ================= */
.navbar{
  position:fixed;
  width:100%;
  background:linear-gradient(90deg,#7b2ff7,#00c6ff);
  z-index:1000;
}

.navbar-inner{
  max-width:1200px;
  margin:auto;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  color:white;
  font-size:24px;
  font-weight:bold;
}

/* USER */
.user-box{
  display:flex;
  align-items:center;
  gap:10px;
  color:white;
  cursor:pointer;
  position:relative;
}

.user-box img{
  width:36px;
  height:36px;
  border-radius:50%;
}

.user-box span{
  max-width:150px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:55px;
  right:0;
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  display:none;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.dropdown div{
  padding:8px;
  cursor:pointer;
}

.dropdown div:hover{
  background:#eee;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:white;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

.modal-box img{
  width:90px;
  height:90px;
  border-radius:50%;
  margin-bottom:10px;
  object-fit:cover;
}

.modal-box input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

.modal-box button{
  padding:10px;
  width:100%;
  background:#00c6ff;
  border:none;
  color:white;
  border-radius:8px;
}

/* ================= CONTENT ================= */
.container{
  max-width:1200px;
  margin:auto;
  padding:110px 25px 30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.value{
  font-size:28px;
  font-weight:bold;
}

/* STATUS */
.aman{color:#2ecc71;}
.waspada{color:#f39c12;}
.bahaya{color:#e74c3c;}

/* PROGRESS */
.progress{
  height:8px;
  background:#eee;
  border-radius:10px;
  margin-top:10px;
}

.progress-bar{
  height:8px;
  width:0%;
  background:#3498db;
  border-radius:10px;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:25px;
}

/* MAP */
#map{
  height:350px;
  border-radius:12px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .row{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-inner">
    <div class="logo">FLOWS-PRO</div>

    <div class="user-box" onclick="toggleMenu()">
      <img id="userPhoto">
      <span id="userName"></span>

      <div id="dropdown" class="dropdown">
        <div onclick="openEdit()">Edit Akun</div>
        <div onclick="logout()">Logout</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h3>Edit Akun</h3>

    <img id="previewPhoto">

    <input type="file" id="photoInput">
    <input type="text" id="editName">

    <button onclick="saveEdit()">Simpan</button>

  </div>
</div>

<!-- CONTENT -->
<div class="container">

<div class="grid">

  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Kondisi</h3>
    <div id="water" class="value">-</div>
  </div>

</div>

<div class="row">

  <div class="card">
    <h3>Grafik Realtime</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Map & Evakuasi</h3>
    <div id="map"></div>
  </div>

</div>

</div>

<script>

/* ================= USER ================= */
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="login.html";
}

function loadUser(){
  userName.innerText = user.name || "User";
  userPhoto.src = user.photo || "https://i.pravatar.cc/150";
}
loadUser();

/* ================= DROPDOWN ================= */
function toggleMenu(){
  dropdown.style.display =
  dropdown.style.display==="block" ? "none" : "block";
}

/* ================= LOGOUT ================= */
function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

/* ================= EDIT ================= */
function openEdit(){
  modal.style.display="flex";
  editName.value = user.name;
  previewPhoto.src = user.photo;
}

/* PREVIEW FOTO */
photoInput.addEventListener("change", function(){

  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    previewPhoto.src = e.target.result;
  };

  reader.readAsDataURL(file);
});

/* SAVE */
function saveEdit(){

  user.name = editName.value;
  user.photo = previewPhoto.src;

  localStorage.setItem("user", JSON.stringify(user));

  loadUser();
  modal.style.display="none";
}

/* CLOSE MODAL */
modal.addEventListener("click",(e)=>{
  if(e.target===modal){
    modal.style.display="none";
  }
});

/* ================= MAP ================= */
let map = L.map('map').setView([1.666,101.45],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

/* ================= CHART ================= */
let chart;

function updateChart(value){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:["Realtime"],
      datasets:[{
        data:[value],
        borderColor:"#00c6ff",
        borderWidth:3
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}

/* ================= SIMULASI DATA ================= */
setInterval(()=>{

  let value = Math.floor(Math.random()*100);

  tinggi.innerText = value+" cm";
  water.innerText = "NORMAL";

  status.innerText = value>70?"BAHAYA":value>40?"WASPADA":"AMAN";

  status.className="value";

  if(value<40) status.classList.add("aman");
  else if(value<70) status.classList.add("waspada");
  else status.classList.add("bahaya");

  progressBar.style.width = value+"%";

  updateChart(value);

},3000);

</script>

</body>
</html>
