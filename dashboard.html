<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO Dashboard</title>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ROUTING -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#f4f6f9;
}

/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  width:100%;
  background:linear-gradient(90deg,#7b2ff7,#00c6ff);
  z-index:1000;
}

/* CONTAINER FIX */
.navbar-inner{
  max-width:1200px;
  margin:auto;
  padding:16px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* LOGO */
.logo{
  color:white;
  font-size:24px;
  font-weight:bold;
}

/* USER */
.user-box{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  color:white;
  position:relative;
  max-width:220px;
}

.user-box img{
  width:36px;
  height:36px;
  border-radius:50%;
}

/* FIX TEKS */
.user-box span{
  max-width:150px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* DROPDOWN */
.dropdown{
  position:absolute;
  top:55px;
  right:0;
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  display:none;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.dropdown div{
  padding:8px;
  cursor:pointer;
}

/* ===== MAIN ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:110px 25px 30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* VALUE */
.value{
  font-size:28px;
  font-weight:bold;
}

/* STATUS */
.aman{color:#2ecc71;}
.waspada{color:#f39c12;}
.bahaya{color:#e74c3c;}

/* PROGRESS */
.progress{
  height:8px;
  background:#eee;
  border-radius:10px;
  margin-top:10px;
}

.progress-bar{
  height:8px;
  width:0%;
  background:#3498db;
  border-radius:10px;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:25px;
}

/* MAP */
#map{
  height:350px;
  border-radius:12px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .row{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="navbar-inner">
    <div class="logo">FLOWS-PRO</div>

    <div class="user-box" onclick="toggleMenu()">
      <img id="userPhoto">
      <span id="userName"></span>

      <div id="dropdown" class="dropdown">
        <div onclick="logout()">Logout</div>
      </div>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="container">

<div class="grid">

  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Kondisi</h3>
    <div id="water" class="value">-</div>
  </div>

</div>

<div class="row">

  <div class="card">
    <h3>Grafik Ketinggian</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Lokasi Sensor & Evakuasi</h3>
    <div id="map"></div>
  </div>

</div>

</div>

<script>

/* USER */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="login.html";
}

document.getElementById("userName").innerText = user.name;
document.getElementById("userPhoto").src = user.photo;

/* DROPDOWN */
function toggleMenu(){
  let d = document.getElementById("dropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}

/* MAP */
let map = L.map('map').setView([1.666,101.45],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let routingControl;

/* DATA SIMULASI REAL (STOP LOOP) */
function loadData(){

  let tinggiAir = 60;
  let statusAir = "WASPADA";
  let lat = 1.666;
  let lng = 101.45;

  document.getElementById("tinggi").innerText = tinggiAir + " cm";
  document.getElementById("water").innerText = statusAir;

  let statusEl = document.getElementById("status");
  statusEl.innerText = statusAir;
  statusEl.className = "value waspada";

  document.getElementById("progressBar").style.width = tinggiAir + "%";

  /* ROUTE */
  let start = L.latLng(lat,lng);
  let safe = L.latLng(1.67,101.46);

  if(routingControl) map.removeControl(routingControl);

  routingControl = L.Routing.control({
    waypoints:[start,safe],
    addWaypoints:false
  }).addTo(map);

  map.setView(start,14);

  loadChart(tinggiAir);
}

/* CHART (TIDAK LOOP) */
let chart;

function loadChart(value){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:["Sekarang"],
      datasets:[{
        data:[value],
        borderColor:"#00c6ff",
        borderWidth:3
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}

/* LOAD SEKALI */
loadData();

</script>

</body>
</html>
