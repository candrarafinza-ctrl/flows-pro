<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 16px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #7b2ff7, #00c6ff);
  z-index: 1000;
}

.logo {
  color: white;
  font-size: 24px;
  font-weight: bold;
}

.user-box {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
}

.user-box img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

/* ===== CONTAINER ===== */
.container {
  padding: 110px 30px 30px;
  max-width: 1200px;
  margin: auto;
}

/* ===== CARD ===== */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-3px);
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

/* ===== VALUE ===== */
.value {
  font-size: 28px;
  font-weight: bold;
}

/* ===== STATUS COLOR ===== */
.aman { color: #2ecc71; }
.waspada { color: #f39c12; }
.bahaya { color: #e74c3c; }

/* ===== PROGRESS ===== */
.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  border-radius: 10px;
  width: 0%;
  background: #3498db;
  transition: 0.5s;
}

/* ===== ROW ===== */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 25px;
}

/* ===== MAP ===== */
#map {
  height: 350px;
  border-radius: 12px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .grid {
    grid-template-columns: 1fr;
  }
  .row {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="user-box">
    <img id="userPhoto">
    <span id="userName"></span>
  </div>
</div>

<div class="container">

<!-- TOP CARDS -->
<div class="grid">

  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>

    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Kondisi</h3>
    <div id="water" class="value">-</div>
  </div>

</div>

<!-- BOTTOM -->
<div class="row">

  <div class="card">
    <h3>Grafik Ketinggian Air</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Lokasi Sensor</h3>
    <div id="map"></div>
  </div>

</div>

</div>

<script>

/* SUPABASE */
const { createClient } = supabase;
const client = createClient(
  "https://hceblnmngnnexxtkeiev.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs"
);

/* USER */
async function loadUser(){
  const { data } = await client.auth.getUser();

  userName.innerText = data.user.user_metadata.full_name;
  userPhoto.src = data.user.user_metadata.avatar_url;
}
loadUser();

/* MAP */
let map = L.map('map').setView([1.666,101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker;

/* DATA */
async function loadData(){

  let { data } = await client.from("data_air")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(1);

  if(data.length){

    let d=data[0];

    tinggi.innerText=d.tinggi_air+" cm";
    water.innerText=d.water_level;

    /* STATUS */
    status.innerText=d.status;
    status.className="value";

    if(d.status=="AMAN") status.classList.add("aman");
    else if(d.status=="WASPADA") status.classList.add("waspada");
    else status.classList.add("bahaya");

    /* PROGRESS */
    let persen = (d.tinggi_air / 100) * 100;
    progressBar.style.width = persen + "%";

    /* MAP */
    if(marker) map.removeLayer(marker);

    marker = L.marker([d.latitude,d.longitude]).addTo(map);

    map.setView([d.latitude,d.longitude],14);
  }
}

/* CHART */
let chart;

async function loadChart(){

  let { data } = await client.from("data_air")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(10);

  let labels=data.map((_,i)=>i+1);
  let val=data.map(d=>d.tinggi_air);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels.reverse(),
      datasets:[{
        data:val.reverse(),
        borderColor:"#00c6ff",
        borderWidth:3,
        tension:0.4,
        fill:true,
        backgroundColor:"rgba(0,198,255,0.1)"
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}

/* LOOP */
setInterval(()=>{
  loadData();
  loadChart();
},5000);

loadData();
loadChart();

</script>

</body>
</html>
