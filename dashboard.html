<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>

/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 16px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #7b2ff7, #00c6ff);
  z-index: 1000;
}

.logo {
  color: white;
  font-size: 24px;
  font-weight: bold;
}

/* USER */
.user-box {
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
  cursor: pointer;
  position: relative;
  max-width: 180px;
}

.user-box img {
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.user-box span {
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* DROPDOWN */
.dropdown {
  position: absolute;
  top: 50px;
  right: 0;
  background: white;
  color: black;
  border-radius: 10px;
  padding: 10px;
  display: none;
  box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

/* ===== CONTAINER ===== */
.container {
  padding: 110px 30px 30px;
  max-width: 1200px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
}

.value {
  font-size: 28px;
  font-weight: bold;
}

/* STATUS */
.aman { color: #2ecc71; }
.waspada { color: #f39c12; }
.bahaya { color: #e74c3c; }

/* PROGRESS */
.progress {
  height: 8px;
  background: #eee;
  border-radius: 10px;
  margin-top: 10px;
}

.progress-bar {
  height: 8px;
  border-radius: 10px;
  width: 0%;
  background: #3498db;
}

/* ROW */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 25px;
}

#map {
  height: 350px;
  border-radius: 12px;
}

</style>
</head>

<body>

<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="user-box" onclick="toggleMenu()">
    <img id="userPhoto">
    <span id="userName"></span>

    <div id="dropdown" class="dropdown">
      <div onclick="logout()">Logout</div>
    </div>
  </div>
</div>

<div class="container">

<div class="grid">

  <div class="card">
    <h3>Tinggi Air</h3>
    <div id="tinggi" class="value">-</div>
    <div class="progress">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="value">-</div>
  </div>

  <div class="card">
    <h3>Kondisi</h3>
    <div id="water" class="value">-</div>
  </div>

</div>

<div class="row">

  <div class="card">
    <h3>Grafik Ketinggian Air</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <h3>Lokasi Sensor & Evakuasi</h3>
    <div id="map"></div>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "ISI_API_KEY",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER */
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
  window.location.href="login.html";
}

userName.innerText = user.name;
userPhoto.src = user.photo;

/* MENU */
window.toggleMenu = () => {
  dropdown.style.display =
    dropdown.style.display === "block" ? "none" : "block";
};

window.logout = () => {
  localStorage.removeItem("user");
  window.location.href="index.html";
};

/* MAP */
let map = L.map('map').setView([1.666,101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let routingControl;

/* LOAD DATA REAL */
async function loadData(){

  const snapshot = await getDocs(collection(db,"data_air"));

  snapshot.forEach(doc => {
    let d = doc.data();

    tinggi.innerText = d.tinggi_air + " cm";
    water.innerText = d.status;

    status.innerText = d.status;
    status.className="value";

    if(d.status=="AMAN") status.classList.add("aman");
    else if(d.status=="WASPADA") status.classList.add("waspada");
    else status.classList.add("bahaya");

    progressBar.style.width = d.tinggi_air + "%";

    /* MAP + ROUTE */
    let start = L.latLng(d.latitude, d.longitude);
    let safe = L.latLng(1.67,101.46);

    if(routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
      waypoints: [start, safe],
      createMarker: () => null,
      addWaypoints: false
    }).addTo(map);

    map.setView(start,14);

    loadChart(d.tinggi_air);
  });
}

/* CHART FIX (NO LOOP) */
let chart;

function loadChart(value){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:["Data"],
      datasets:[{
        data:[value],
        borderColor:"#00c6ff",
        borderWidth:3
      }]
    },
    options:{
      plugins:{legend:{display:false}}
    }
  });
}

loadData();

</script>

</body>
