<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard FLOWS PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  transition: 0.5s;
}

header {
  background: #1e3c72;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 10px 0;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  font-size: 18px;
}

.status {
  font-size: 24px;
  font-weight: bold;
}

#alertBox {
  display:none;
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  color:white;
  padding:15px 30px;
  border-radius:10px;
  font-weight:bold;
  z-index:999;
}
</style>
</head>

<body>

<header>
  <div>🌊 FLOWS PRO</div>
  <button onclick="logout()">Logout</button>
</header>

<div id="alertBox">🚨 BAHAYA BANJIR!</div>

<div class="container">

  <div class="card">Tinggi Air: <span id="tinggi">-</span></div>
  <div class="card">Status: <span id="status" class="status">-</span></div>
  <div class="card">Water Level: <span id="water">-</span></div>

  <div class="card">
    <canvas id="chartAir"></canvas>
  </div>

</div>

<!-- SOUND -->
<audio id="alarmSound">
  <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
</audio>

<script>
const SUPABASE_URL = "https://hceblnmngnnexxtkeiev.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

let chart;

// UNLOCK AUDIO
document.body.addEventListener("click", () => {
  let a = document.getElementById("alarmSound");
  a.play().then(() => a.pause());
}, { once: true });

// CEK LOGIN
async function checkUser() {
  const { data } = await client.auth.getSession();
  if (!data.session) {
    window.location.href = "login.html";
  }
}
checkUser();

// LOGOUT
async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

// LOAD DATA
async function loadData() {

  const { data } = await client
    .from("data_air")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(1);

  if (data && data.length > 0) {

    let d = data[0];

    document.getElementById("tinggi").innerText = d.tinggi_air + " cm";
    document.getElementById("status").innerText = d.status;
    document.getElementById("water").innerText = d.water_level;

    let alarm = document.getElementById("alarmSound");
    let alertBox = document.getElementById("alertBox");

    if (d.status === "AMAN") {
      document.body.style.background = "#2ecc71";
      alertBox.style.display = "none";
      alarm.pause();
    }
    else if (d.status === "WASPADA") {
      document.body.style.background = "#f1c40f";
      alertBox.innerText = "⚠️ WASPADA BANJIR";
      alertBox.style.display = "block";
      alarm.play();
    }
    else {
      document.body.style.background = "#e74c3c";
      alertBox.innerText = "🚨 BAHAYA BANJIR!";
      alertBox.style.display = "block";
      alarm.play();
    }

  }
}

// LOAD GRAFIK
async function loadChart() {

  const { data } = await client
    .from("data_air")
    .select("*")
    .order("created_at", { ascending: true })
    .limit(10);

  if (data && data.length > 0) {

    let labels = data.map((d, i) => "Data " + (i+1));
    let tinggi = data.map(d => d.tinggi_air);

    if (chart) chart.destroy();

    const ctx = document.getElementById("chartAir").getContext("2d");

    chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Tinggi Air (cm)",
          data: tinggi,
          borderWidth: 3,
          fill: false,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

  }
}

// LOAD AWAL
loadData();
loadChart();

// AUTO UPDATE
setInterval(() => {
  loadData();
  loadChart();
}, 5000);

</script>

</body>
</html>
