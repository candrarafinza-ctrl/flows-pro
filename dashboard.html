<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard FLOWS-PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      background: #f4f6f9;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #0d47a1;
      color: white;
      padding: 20px;
      position: fixed;
    }

    .sidebar h2 {
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 15px 0;
      transition: 0.3s;
    }

    .sidebar a:hover {
      padding-left: 10px;
    }

    /* ===== MAIN ===== */
    .main {
      margin-left: 220px;
      width: 100%;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: white;
      padding: 15px 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
    }

    /* ===== CARDS ===== */
    .cards {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 200px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    /* ===== STATUS ===== */
    .status {
      margin: 20px;
      padding: 15px;
      border-radius: 10px;
      color: white;
      text-align: center;
      font-weight: bold;
    }

    .aman { background: green; }
    .waspada { background: orange; }
    .bahaya { background: red; }

    /* ===== CHART ===== */
    .chart-container {
      margin: 20px;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main {
        margin-left: 0;
      }

      .cards {
        flex-direction: column;
      }
    }

  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>FLOWS-PRO</h2>
    <a href="#">Dashboard</a>
    <a href="#">Data Sensor</a>
    <a href="#">Riwayat</a>
    <a href="#">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
      <h3>Dashboard Monitoring</h3>
      <span id="time"></span>
    </div>

    <!-- STATUS -->
    <div id="statusBox" class="status aman">
      Status: AMAN
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card">
        <h3>Ketinggian Air</h3>
        <div class="value" id="water">20 cm</div>
      </div>

      <div class="card">
        <h3>Arus Air</h3>
        <div class="value" id="flow">1.2 m/s</div>
      </div>

      <div class="card">
        <h3>Cuaca</h3>
        <div class="value" id="weather">Cerah</div>
      </div>
    </div>

    <!-- CHART -->
    <div class="chart-container">
      <canvas id="myChart"></canvas>
    </div>

  </div>

  <script>
    // ===== JAM REALTIME =====
    setInterval(() => {
      document.getElementById("time").innerText =
        new Date().toLocaleTimeString();
    }, 1000);

    // ===== SIMULASI DATA =====
    function updateData() {
      let water = Math.floor(Math.random() * 100);
      document.getElementById("water").innerText = water + " cm";

      let statusBox = document.getElementById("statusBox");

      if (water < 30) {
        statusBox.className = "status aman";
        statusBox.innerText = "Status: AMAN";
      } else if (water < 70) {
        statusBox.className = "status waspada";
        statusBox.innerText = "Status: WASPADA";
      } else {
        statusBox.className = "status bahaya";
        statusBox.innerText = "Status: BAHAYA";
      }
    }

    setInterval(updateData, 3000);

    // ===== CHART =====
    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['1', '2', '3', '4', '5'],
        datasets: [{
          label: 'Ketinggian Air',
          data: [10, 20, 30, 25, 40],
          borderWidth: 2
        }]
      }
    });
  </script>

</body>
</html>
