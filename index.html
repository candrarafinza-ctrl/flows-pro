<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  overflow:hidden;
}

/* NAVBAR */
.navbar {
  position:fixed;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  z-index:1000;
}

.logo {
  color:white;
  font-size:24px;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:25px;
}

.menu a {
  color:white;
  cursor:pointer;
  padding:6px 12px;
  border-radius:8px;
  transition:0.3s;
}

/* efek timbul */
.menu a.active {
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
  transform: translateY(-2px);
}

.menu a:hover {
  background: rgba(255,255,255,0.15);
}

.login {
  background:white;
  padding:8px 18px;
  border-radius:8px;
  text-decoration:none;
  color:black;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

.hero-content {
  position:relative;
  z-index:2;
  color:white;
  top:50%;
  transform:translateY(-50%);
  padding:0 40px;
  max-width:700px;
}

.hero h1 {
  font-size:42px;
}

.hero p {
  margin-top:10px;
  line-height:1.6;
}

.cta {
  margin-top:20px;
}

.cta a {
  background:#00c6ff;
  padding:12px 24px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.3s;
}

.cta a:hover {
  background:#009ec3;
}

/* PANEL */
.overlay {
  position:fixed;
  top:-80%;
  left:0;
  width:100%;
  height:70%;
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.15);
  transition:0.5s ease;
  z-index:999;
  padding:50px;
  color:white;
}

.overlay.show {
  top:0;
}

.overlay.hide {
  top:-80%;
}

/* PANEL CONTENT */
.panel-content {
  max-width:900px;
  margin:auto;
  animation: fadeIn 0.5s;
}

.panel-content h2 {
  margin-bottom:15px;
}

.panel-content p {
  line-height:1.8;
}

/* CLOSE AREA */
.close-area {
  position:fixed;
  top:70%;
  width:100%;
  height:30%;
  display:none;
}

.close-area.show {
  display:block;
}

/* ANIMASI */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(-20px);}
  to {opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:768px){
  .menu {display:none;}
  .hero h1 {font-size:26px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a id="tentangBtn" onclick="changePanel('tentang')">Tentang</a>
    <a id="fiturBtn" onclick="changePanel('fitur')">Fitur</a>
    <a id="kontakBtn" onclick="changePanel('kontak')">Kontak</a>
  </div>

  <a href="login.html" class="login">Login</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Monitoring Banjir Real-Time</h1>
    <p>
      Sistem berbasis IoT untuk mendeteksi kondisi air secara cepat dan akurat
      guna meningkatkan keselamatan masyarakat.
    </p>

    <div class="cta">
      <a href="login.html">Masuk Dashboard</a>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="panel" class="overlay">
  <div id="panelContent" class="panel-content"></div>
</div>

<div id="closeArea" class="close-area" onclick="closePanel()"></div>

<script>

/* DATA */
const data = {
  tentang: `
    <h2>Tentang Sistem</h2>
    <p>
    FLOWS-PRO merupakan sistem monitoring banjir berbasis IoT yang mampu
    memberikan informasi kondisi air secara real-time untuk membantu
    masyarakat dalam menghadapi potensi banjir.
    </p>
  `,
  fitur: `
    <h2>Cara Kerja</h2>
    <p>
    Sensor membaca ketinggian air, data dikirim ke server, lalu ditampilkan
    melalui website secara real-time dalam bentuk monitoring dan peta.
    </p>
  `,
  kontak: `
    <h2>Manfaat & Tujuan</h2>
    <p>
    Memberikan peringatan dini, meningkatkan keselamatan masyarakat,
    serta membantu pengambilan keputusan saat kondisi darurat banjir.
    </p>
  `
};

let current = null;

/* RESET ACTIVE MENU */
function resetMenu(){
  document.querySelectorAll(".menu a").forEach(el=>el.classList.remove("active"));
}

/* GANTI PANEL */
function changePanel(type){

  const panel = document.getElementById("panel");

  if(current === type){
    closePanel();
    return;
  }

  resetMenu();
  document.getElementById(type+"Btn").classList.add("active");

  if(panel.classList.contains("show")){
    panel.classList.remove("show");
    panel.classList.add("hide");

    setTimeout(()=>{
      document.getElementById("panelContent").innerHTML = data[type];
      panel.classList.remove("hide");
      panel.classList.add("show");
    },400);

  } else {
    document.getElementById("panelContent").innerHTML = data[type];
    panel.classList.add("show");
    document.getElementById("closeArea").classList.add("show");
  }

  current = type;
}

/* CLOSE */
function closePanel(){
  const panel = document.getElementById("panel");
  panel.classList.remove("show");
  panel.classList.add("hide");
  document.getElementById("closeArea").classList.remove("show");
  resetMenu();
  current = null;
}

</script>

</body>
</html>
