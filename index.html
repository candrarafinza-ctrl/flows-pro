<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  overflow:hidden;
}

/* ===== NAVBAR ===== */
.navbar {
  position:fixed;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  z-index:1000;

  /* animasi masuk */
  animation: slideDown 0.8s ease;
}

.logo {
  color:white;
  font-size:24px;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:25px;
}

.menu a {
  color:white;
  cursor:pointer;
  padding:6px 14px;
  border-radius:8px;
  transition:0.3s;
}

/* aktif */
.menu a.active {
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(6px);
  transform: translateY(-2px);
}

.menu a:hover {
  background: rgba(255,255,255,0.15);
}

.login {
  background:white;
  padding:8px 18px;
  border-radius:8px;
  text-decoration:none;
  color:black;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);

  /* animasi background */
  animation: fadeBg 1.5s ease;
}

.hero-content {
  position:relative;
  z-index:2;
  color:white;
  top:50%;
  transform:translateY(-50%);
  padding:0 40px;
  max-width:700px;
}

/* animasi teks */
.hero h1 {
  font-size:42px;
  margin-bottom:10px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.6s;
}

.hero p {
  font-size:17px;
  line-height:1.6;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.8s;
}

/* tombol */
.cta {
  margin-top:20px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:1s;
}

.cta a {
  background:#00c6ff;
  padding:12px 26px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-weight:500;
  transition:0.3s;
}

.cta a:hover {
  background:#009ec3;
}

/* ===== PANEL ===== */
.overlay {
  position:fixed;
  top:-80%;
  left:0;
  width:100%;
  height:70%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.35);
  transition:0.5s ease;
  z-index:999;

  padding-top:90px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.overlay.show {
  top:0;
}

.overlay.hide {
  top:-80%;
}

/* BOX PANEL */
.panel-box {
  width:90%;
  max-width:800px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeIn 0.5s;
  color:white;
}

/* teks */
.panel-box h2 {
  font-size:26px;
  margin-bottom:15px;
}

.panel-box p {
  font-size:16px;
  line-height:1.8;
}

/* close */
.close-area {
  position:fixed;
  top:70%;
  width:100%;
  height:30%;
  display:none;
}

.close-area.show {
  display:block;
}

/* ===== ANIMASI ===== */
@keyframes slideDown {
  from {transform: translateY(-100%);}
  to {transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeBg {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(-20px);}
  to {opacity:1; transform:translateY(0);}
}

/* RESPONSIVE */
@media(max-width:768px){
  .menu {display:none;}
  .hero h1 {font-size:26px;}
  .hero p {font-size:14px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a id="tentangBtn" onclick="changePanel('tentang')">Tentang</a>
    <a id="fiturBtn" onclick="changePanel('fitur')">Fitur</a>
    <a id="kontakBtn" onclick="changePanel('kontak')">Kontak</a>
  </div>

  <a href="login.html" class="login">Login</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Monitoring Banjir Real-Time</h1>
    <p>
      Sistem berbasis IoT untuk mendeteksi kondisi air secara cepat dan akurat
      guna meningkatkan keselamatan masyarakat dari risiko banjir.
    </p>

    <div class="cta">
      <a href="login.html">Masuk Dashboard</a>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="panel" class="overlay">
  <div class="panel-box" id="panelContent"></div>
</div>

<div id="closeArea" class="close-area" onclick="closePanel()"></div>

<script>

const data = {

  tentang: `
    <h2>Tentang Sistem</h2>
    <p>
    FLOWS-PRO adalah sistem monitoring banjir berbasis IoT yang memberikan
    informasi kondisi air secara real-time untuk membantu masyarakat
    mengambil tindakan cepat.
    </p>
  `,

  fitur: `
    <h2>Cara Kerja Sistem</h2>
    <p>
    Sensor membaca ketinggian air, data dikirim ke server,
    lalu ditampilkan secara real-time dalam bentuk grafik dan peta.
    </p>
  `,

  kontak: `
    <h2>Manfaat & Tujuan</h2>
    <p>
    Memberikan peringatan dini, meningkatkan keselamatan masyarakat,
    serta membantu mitigasi bencana banjir.
    </p>
  `

};

let current = null;

function resetMenu(){
  document.querySelectorAll(".menu a").forEach(el=>el.classList.remove("active"));
}

function changePanel(type){

  const panel = document.getElementById("panel");

  if(current === type){
    closePanel();
    return;
  }

  resetMenu();
  document.getElementById(type+"Btn").classList.add("active");

  if(panel.classList.contains("show")){
    panel.classList.remove("show");
    panel.classList.add("hide");

    setTimeout(()=>{
      document.getElementById("panelContent").innerHTML = data[type];
      panel.classList.remove("hide");
      panel.classList.add("show");
    },400);

  } else {
    document.getElementById("panelContent").innerHTML = data[type];
    panel.classList.add("show");
    document.getElementById("closeArea").classList.add("show");
  }

  current = type;
}

function closePanel(){
  const panel = document.getElementById("panel");
  panel.classList.remove("show");
  panel.classList.add("hide");
  document.getElementById("closeArea").classList.remove("show");
  resetMenu();
  current = null;
}

</script>

</body>
</html>
