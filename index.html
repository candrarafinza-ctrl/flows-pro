<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Banjir</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      position: absolute;
      top: 0;
      right: 0;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      padding: 20px;
      z-index: 10;
    }

    .login-btn {
      padding: 10px 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: black;
      transform: scale(1.05);
    }

    /* ===== HERO ===== */
    .hero {
      width: 100%;
      height: 100vh;
      background-image: url('Desain tanpa judul (1).png'); /* GANTI SESUAI NAMA FILE */
      background-size: cover; /* desktop */
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* overlay */
    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
    }

    .overlay {
      position: relative;
      color: white;
      text-align: center;
      z-index: 2;
      animation: fadeIn 1.5s ease;
    }

    .overlay h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .overlay p {
      font-size: 18px;
    }

    /* animasi */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== RESPONSIVE HP ===== */
    @media (max-width: 768px) {
      .hero {
        height: auto;
        min-height: 100vh;
        background-size: contain; /* biar tidak kepotong */
        background-color: black;
      }

      .overlay h1 {
        font-size: 24px;
      }

      .overlay p {
        font-size: 14px;
      }
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <a href="login.html" class="login-btn">Login</a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay">
      <h1>Monitoring Banjir</h1>
      <p>Realtime & Terintegrasi</p>
    </div>
  </section>

</body>
</html>
