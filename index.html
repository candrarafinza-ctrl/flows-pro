<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<style>

/* ===== RESET ===== */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  overflow:hidden;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  z-index:1000;
}

.logo {
  color:white;
  font-size:24px;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:30px;
}

.menu a {
  color:white;
  text-decoration:none;
  cursor:pointer;
}

.login {
  background:white;
  padding:8px 18px;
  border-radius:8px;
  text-decoration:none;
  color:black;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* ===== CONTENT HERO ===== */
.hero-content {
  position:relative;
  z-index:2;
  color:white;
  top:50%;
  transform:translateY(-50%);
  padding:0 40px;
  max-width:700px;
}

.hero h1 {
  font-size:42px;
}

.hero p {
  margin-top:10px;
  line-height:1.6;
}

/* ===== PANEL ===== */
.overlay {
  position:fixed;
  top:-100%;
  left:0;
  width:100%;
  height:70%;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.2);
  transition:0.5s;
  z-index:999;
  padding:40px;
  color:white;
}

.overlay.active {
  top:0;
}

/* ===== PANEL CONTENT ===== */
.panel-content {
  max-width:900px;
  margin:auto;
}

.panel-content h2 {
  margin-bottom:15px;
}

.panel-content p {
  line-height:1.7;
}

/* ===== CLOSE AREA ===== */
.close-area {
  position:fixed;
  top:70%;
  width:100%;
  height:30%;
  display:none;
}

.close-area.active {
  display:block;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .menu {display:none;}
  .hero h1 {font-size:26px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a onclick="openPanel('tentang')">Tentang</a>
    <a onclick="openPanel('fitur')">Fitur</a>
    <a onclick="openPanel('kontak')">Kontak</a>
  </div>

  <a href="login.html" class="login">Login</a>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Monitoring Banjir Real-Time</h1>
    <p>
      Sistem berbasis IoT untuk mendeteksi kondisi air secara cepat dan akurat
      guna meningkatkan keselamatan masyarakat dari risiko banjir.
    </p>
  </div>
</div>

<!-- PANEL -->
<div id="panel" class="overlay">
  <div class="panel-content" id="panelContent"></div>
</div>

<div id="closeArea" class="close-area" onclick="closePanel()"></div>

<script>

/* ===== DATA TEXT ===== */
const content = {

  tentang: `
    <h2>Tentang Sistem</h2>
    <p>
    FLOWS-PRO merupakan sistem monitoring banjir berbasis Internet of Things (IoT)
    yang dirancang untuk memberikan informasi kondisi air secara real-time.
    Sistem ini membantu masyarakat dan pihak terkait dalam mengambil tindakan cepat
    untuk mengurangi dampak bencana banjir.
    </p>
  `,

  fitur: `
    <h2>Cara Kerja Sistem</h2>
    <p>
    Sensor akan membaca ketinggian air dan kondisi lingkungan sekitar,
    kemudian data dikirim ke server dan ditampilkan melalui website.
    Informasi ini dapat diakses secara real-time dalam bentuk grafik,
    status kondisi, serta peta lokasi.
    </p>
  `,

  kontak: `
    <h2>Manfaat & Tujuan</h2>
    <p>
    Sistem ini bertujuan untuk memberikan peringatan dini terhadap potensi banjir,
    meningkatkan kesadaran masyarakat, serta membantu proses mitigasi bencana.
    Dengan adanya sistem ini, diharapkan kerugian akibat banjir dapat diminimalisir.
    </p>
  `

};

/* ===== OPEN PANEL ===== */
function openPanel(type){
  document.getElementById("panel").classList.add("active");
  document.getElementById("closeArea").classList.add("active");
  document.getElementById("panelContent").innerHTML = content[type];
}

/* ===== CLOSE PANEL ===== */
function closePanel(){
  document.getElementById("panel").classList.remove("active");
  document.getElementById("closeArea").classList.remove("active");
}

</script>

</body>
</html>
