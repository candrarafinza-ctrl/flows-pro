<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<style>

/* ===== RESET ===== */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  overflow:hidden;
}

/* ===== NAVBAR ===== */
.navbar {
  position:fixed;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  z-index:1000;
  animation: slideDown 0.8s ease;
}

.logo {
  color:white;
  font-size:24px;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:25px;
}

.menu a {
  color:white;
  cursor:pointer;
  padding:6px 14px;
  border-radius:8px;
  transition:0.3s;
}

.menu a:hover {
  background: rgba(255,255,255,0.15);
}

.login {
  background:white;
  padding:8px 18px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
  animation: fadeBg 1.5s ease;
}

.hero-content {
  position:relative;
  z-index:2;
  color:white;
  top:50%;
  transform:translateY(-50%);
  padding:0 40px;
  max-width:700px;
}

.hero h1 {
  font-size:42px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.6s;
}

.hero p {
  margin-top:10px;
  font-size:17px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.8s;
}

.cta {
  margin-top:20px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:1s;
}

.cta a {
  background:#00c6ff;
  padding:12px 26px;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

/* ===== PANEL LAMA (TETAP ADA) ===== */
.overlay {
  position:fixed;
  top:-80%;
  width:100%;
  height:70%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.35);
  transition:0.5s;
  padding-top:90px;
  display:flex;
  justify-content:center;
}

.overlay.show { top:0; }

.panel-box {
  width:90%;
  max-width:800px;
  background: rgba(255,255,255,0.15);
  padding:30px;
  border-radius:20px;
  color:white;
}

.close-area {
  position:fixed;
  top:70%;
  width:100%;
  height:30%;
  display:none;
}

.close-area.show { display:block; }

/* ===== PANEL BARU (HOVER) ===== */
.menu-panel {
  position:fixed;
  top:90px;
  left:50%;
  transform:translateX(-50%) translateY(-10px);

  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  padding:20px 25px;
  border-radius:16px;
  color:white;
  max-width:450px;
  text-align:center;

  opacity:0;
  pointer-events:none;
  transition:0.25s;
}

.menu-panel.show {
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}

/* ===== LOGIN MODAL ===== */
.auth-modal {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background: rgba(0,0,0,0.4);
  z-index:2000;
  opacity:0;
  visibility:hidden;
  transition:0.4s;
}

.auth-modal.show {
  opacity:1;
  visibility:visible;
}

.auth-box {
  width:80%;
  max-width:900px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius:20px;
  padding:50px;
  text-align:center;
}

.auth-box h1 {
  font-size:32px;
  color:white;
  margin-bottom:20px;
}

.auth-box p {
  color:rgba(255,255,255,0.8);
  margin-bottom:40px;
}

.auth-options {
  display:flex;
  justify-content:center;
  gap:40px;
}

.btn {
  padding:12px;
  border-radius:10px;
  text-decoration:none;
}

.putih { background:#eee; color:black; }
.hitam { background:black; color:white; }

.close-btn {
  position:absolute;
  top:20px;
  right:30px;
  cursor:pointer;
  color:white;
}

/* ===== ANIMASI ===== */
@keyframes slideDown {
  from {transform: translateY(-100%);}
  to {transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeBg {
  from {opacity:0;}
  to {opacity:1;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a onmouseenter="hoverMenu('tentang')" onclick="lockMenu('tentang')">Tentang</a>
    <a onmouseenter="hoverMenu('fitur')" onclick="lockMenu('fitur')">Fitur</a>
    <a onmouseenter="hoverMenu('kontak')" onclick="lockMenu('kontak')">Kontak</a>
  </div>

  <button class="login" onclick="openAuth()">Login</button>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Monitoring Banjir Real-Time</h1>
    <p>Sistem berbasis IoT untuk deteksi kondisi air secara cepat dan akurat.</p>

    <div class="cta">
      <a href="login.html">Masuk Dashboard</a>
    </div>
  </div>
</div>

<!-- PANEL BARU -->
<div id="menuPanel" class="menu-panel"></div>

<!-- PANEL LAMA (TIDAK DIHAPUS) -->
<div id="panel" class="overlay">
  <div id="panelContent" class="panel-box"></div>
</div>

<div id="closeArea" class="close-area" onclick="closePanel()"></div>

<!-- LOGIN MODAL -->
<div id="authModal" class="auth-modal">
  <div class="auth-box">
    <div class="close-btn" onclick="closeAuth()">✕</div>

    <h1>Akses Akun FLOWS-PRO</h1>
    <p>Silakan pilih metode akses untuk melanjutkan ke sistem monitoring</p>

    <div class="auth-options">
      <a href="register.html" class="btn putih">Buat Akun</a>
      <a href="login.html" class="btn hitam">Masuk</a>
    </div>
  </div>
</div>

<script>

/* AUTH */
function openAuth(){
  document.getElementById("authModal").classList.add("show");
}
function closeAuth(){
  document.getElementById("authModal").classList.remove("show");
}

/* DATA */
const data = {
  tentang: "<h3>Tentang</h3><p>FLOWS-PRO adalah sistem monitoring banjir berbasis IoT.</p>",
  fitur: "<h3>Fitur</h3><p>Monitoring real-time, sensor air, dan visualisasi data.</p>",
  kontak: "<h3>Manfaat</h3><p>Meningkatkan keselamatan dan mitigasi bencana.</p>"
};

let locked = false;

/* HOVER */
function hoverMenu(type){
  if(locked) return;
  let panel = document.getElementById("menuPanel");
  panel.innerHTML = data[type];
  panel.classList.add("show");
}

/* CLICK LOCK */
function lockMenu(type){
  let panel = document.getElementById("menuPanel");

  if(locked){
    panel.classList.remove("show");
    locked = false;
  } else {
    panel.innerHTML = data[type];
    panel.classList.add("show");
    locked = true;
  }
}

/* AUTO HIDE */
document.addEventListener("mousemove", function(e){
  if(locked) return;
  let menu = document.querySelector(".menu");
  if(!menu.contains(e.target)){
    document.getElementById("menuPanel").classList.remove("show");
  }
});

/* CLICK OUTSIDE */
document.addEventListener("click", function(e){
  let menu = document.querySelector(".menu");
  if(!menu.contains(e.target)){
    document.getElementById("menuPanel").classList.remove("show");
    locked = false;
  }
});

/* PANEL LAMA (tetap ada) */
function changePanel(type){
  document.getElementById("panelContent").innerHTML = data[type];
  document.getElementById("panel").classList.add("show");
  document.getElementById("closeArea").classList.add("show");
}

function closePanel(){
  document.getElementById("panel").classList.remove("show");
  document.getElementById("closeArea").classList.remove("show");
}

</script>

</body>
</html>
