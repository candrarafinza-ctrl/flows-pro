<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FLOWS-PRO</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.7); /* latar jelas */
      backdrop-filter: blur(5px);
    }

    .logo {
      color: white;
      font-size: 20px;
      font-weight: bold;
    }

    .login-btn {
      padding: 8px 18px;
      background: #00bcd4;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #0097a7;
      transform: scale(1.05);
    }

    /* ===== HERO ===== */
    .hero {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Background gambar blur */
    .hero::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: url('Desain tanpa judul (1).png');
      background-size: cover;
      background-position: center;
      filter: blur(6px); /* blur disini */
      transform: scale(1.1); /* biar blur tidak nge-cut */
      z-index: 1;
    }

    /* overlay gelap */
    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 2;
    }

    /* konten */
    .overlay {
      position: relative;
      z-index: 3;
      color: white;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      animation: fadeIn 1.5s ease;
    }

    .overlay h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .overlay p {
      font-size: 18px;
    }

    /* animasi */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-40%);
      }
      to {
        opacity: 1;
        transform: translateY(-50%);
      }
    }

    /* ===== RESPONSIVE HP ===== */
    @media (max-width: 768px) {
      .overlay h1 {
        font-size: 24px;
      }

      .overlay p {
        font-size: 14px;
      }

      .header {
        padding: 10px 15px;
      }
    }

  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">FLOWS-PRO</div>
    <a href="login.html" class="login-btn">Login</a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="overlay">
      <h1>Monitoring Banjir</h1>
      <p>Realtime & Terintegrasi</p>
    </div>
  </section>

</body>
</html>
