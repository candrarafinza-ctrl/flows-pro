<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS-PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  overflow:hidden;
}

/* NAVBAR */
.navbar {
  position:fixed;
  width:100%;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(90deg,#6a11cb,#2575fc);
  z-index:1000;
  animation: slideDown 0.8s ease;
}

.logo {
  color:white;
  font-size:24px;
  font-weight:bold;
}

.menu {
  display:flex;
  gap:25px;
}

.menu a {
  color:white;
  cursor:pointer;
  padding:6px 14px;
  border-radius:8px;
  transition:0.3s;
}

.menu a.active {
  background: rgba(255,255,255,0.25);
  transform: translateY(-2px);
}

.menu a:hover {
  background: rgba(255,255,255,0.15);
}

/* LOGIN BUTTON */
.login {
  background:white;
  padding:8px 18px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
  animation: fadeBg 1.5s ease;
}

.hero-content {
  position:relative;
  z-index:2;
  color:white;
  top:50%;
  transform:translateY(-50%);
  padding:0 40px;
  max-width:700px;
}

.hero h1 {
  font-size:42px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.6s;
}

.hero p {
  margin-top:10px;
  font-size:17px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:0.8s;
}

.cta {
  margin-top:20px;
  opacity:0;
  animation: fadeUp 1s ease forwards;
  animation-delay:1s;
}

.cta a {
  background:#00c6ff;
  padding:12px 26px;
  border-radius:10px;
  text-decoration:none;
  color:white;
}

/* PANEL */
.overlay {
  position:fixed;
  top:-80%;
  left:0;
  width:100%;
  height:70%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.35);
  transition:0.5s ease;
  z-index:999;
  padding-top:90px;
  display:flex;
  justify-content:center;
}

.overlay.show { top:0; }

.panel-box {
  width:90%;
  max-width:800px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:30px;
  border-radius:20px;
  color:white;
}

.close-area {
  position:fixed;
  top:70%;
  width:100%;
  height:30%;
  display:none;
}

.close-area.show { display:block; }

/* ===== AUTH MODAL ===== */
.auth-modal {
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  top:0;
  left:0;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2000;

  opacity:0;
  visibility:hidden;
  transition:0.4s;
}

.auth-modal.show {
  opacity:1;
  visibility:visible;
}

/* BOX */
.auth-box {
  text-align:center;
  color:white;
  animation: fadeUp 0.6s ease;
}

/* TITLE */
.auth-box h1 {
  font-size:44px;
  margin-bottom:40px;
  letter-spacing:3px;
  font-weight:900;
}

/* OPTIONS */
.auth-options {
  display:flex;
  gap:50px;
  justify-content:center;
  flex-wrap:wrap;
}

.opt p {
  margin-bottom:10px;
  opacity:0.8;
}

/* BUTTON */
.btn {
  display:block;
  padding:14px 50px;
  text-decoration:none;
  font-weight:bold;
  border-radius:4px;
}

/* PUTIH */
.putih {
  background:#e5e5e5;
  color:black;
}

/* HITAM */
.hitam {
  background:black;
  color:white;
}

/* CLOSE */
.close-btn {
  position:absolute;
  top:40px;
  right:60px;
  font-size:28px;
  cursor:pointer;
  background:#ff4d4d;
  padding:5px 12px;
  border-radius:6px;
}

/* ANIMASI */
@keyframes slideDown {
  from {transform: translateY(-100%);}
  to {transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes fadeBg {
  from {opacity:0;}
  to {opacity:1;}
}

@media(max-width:768px){
  .menu {display:none;}
  .hero h1 {font-size:26px;}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">FLOWS-PRO</div>

  <div class="menu">
    <a onclick="changePanel('tentang')" id="tentangBtn">Tentang</a>
    <a onclick="changePanel('fitur')" id="fiturBtn">Fitur</a>
    <a onclick="changePanel('kontak')" id="kontakBtn">Kontak</a>
  </div>

  <button class="login" onclick="openAuth()">Login</button>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Monitoring Banjir Real-Time</h1>
    <p>Sistem berbasis IoT untuk deteksi kondisi air secara cepat dan akurat.</p>

    <div class="cta">
      <a href="login.html">Masuk Dashboard</a>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="panel" class="overlay">
  <div id="panelContent" class="panel-box"></div>
</div>

<div id="closeArea" class="close-area" onclick="closePanel()"></div>

<!-- AUTH MODAL -->
<div id="authModal" class="auth-modal">

  <div class="auth-box">

    <div class="close-btn" onclick="closeAuth()">✕</div>

    <h1>\ PERSIAPKAN DIRI UNTUK BERMAIN \</h1>

    <div class="auth-options">

      <div class="opt">
        <p>Aku tidak punya akun FLOWS-PRO</p>
        <a href="register.html" class="btn putih">BUAT AKUN</a>
      </div>

      <div class="opt">
        <p>Aku punya akun FLOWS-PRO</p>
        <a href="login.html" class="btn hitam">SIGN IN</a>
      </div>

    </div>

  </div>

</div>

<script>

/* AUTH */
function openAuth(){
  document.getElementById("authModal").classList.add("show");
}

function closeAuth(){
  document.getElementById("authModal").classList.remove("show");
}

/* PANEL */
const data = {
  tentang: "<h2>Tentang</h2><p>Sistem monitoring banjir berbasis IoT.</p>",
  fitur: "<h2>Cara Kerja</h2><p>Sensor kirim data real-time ke web.</p>",
  kontak: "<h2>Manfaat</h2><p>Meningkatkan keselamatan masyarakat.</p>"
};

function changePanel(type){
  document.getElementById("panelContent").innerHTML = data[type];
  document.getElementById("panel").classList.add("show");
  document.getElementById("closeArea").classList.add("show");
}

function closePanel(){
  document.getElementById("panel").classList.remove("show");
  document.getElementById("closeArea").classList.remove("show");
}

</script>

</body>
</html>
