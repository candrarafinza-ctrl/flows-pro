<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWS PRO</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  overflow-x: hidden;
  animation: fadeIn 1s ease;
}

/* ANIMASI MASUK */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

/* LOGO */
.logo {
  font-size: 20px;
  font-weight: bold;
}

/* LOGIN BUTTON */
.login-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: white;
  color: #2a5298;
  font-weight: bold;
  transition: all 0.3s ease;
}

/* HOVER */
.login-btn:hover {
  transform: scale(1.1);
  background: #ddd;
}

/* CLICK */
.login-btn:active {
  transform: scale(0.95);
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

.hero h1 {
  font-size: 45px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
}

/* RESPONSIVE */
@media(max-width:600px){
  .hero h1 {
    font-size: 26px;
  }

  .hero p {
    font-size: 14px;
  }

  header {
    padding: 15px 20px;
  }
}

</style>
</head>

<body>

<header>
  <div class="logo">🌊 FLOWS PRO</div>
  <button class="login-btn" onclick="goLogin()">Login</button>
</header>

<section class="hero">
  <h1>Monitoring Banjir Real-Time</h1>
  <p>Sistem IoT berbasis web untuk deteksi banjir</p>
</section>

<script>

/* ANIMASI PINDAH HALAMAN */
function goLogin() {
  document.body.style.opacity = "0";
  document.body.style.transition = "0.4s";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 400);
}

</script>

</body>
</html>
