<!DOCTYPE html>
<html>
<head>
  <title>FLOWS PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
    }

    .header {
      background: #0d47a1;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .dashboard {
      display: flex;
      gap: 10px;
      padding: 10px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 150px;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
    }

    .status {
      font-size: 18px;
      font-weight: bold;
    }

    #map {
      height: 450px;
      margin: 10px;
      border-radius: 10px;
    }

    .aman { color: green; }
    .waspada { color: orange; }
    .bahaya { color: red; }
  </style>
</head>

<body>

<div class="header">🌊 FLOWS PRO - Smart Flood Monitoring</div>

<div class="dashboard">
  <div class="card">
    <div>Tinggi Air</div>
    <div class="value" id="tinggi">-</div>
  </div>

  <div class="card">
    <div>Status</div>
    <div class="status" id="status">-</div>
  </div>

  <div class="card">
    <div>Deteksi Air</div>
    <div class="value" id="water">-</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([1.666, 101.45], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var marker;

function loadData() {

  fetch("https://hceblnmngnnexxtkeiev.supabase.co/rest/v1/data_air?select=*&order=id.desc&limit=1", {
    headers: {
      "apikey": "ISI_API_KEY_KAMU"
    }
  })
  .then(res => res.json())
  .then(data => {

    let d = data[0];

    document.getElementById("tinggi").innerText = d.tinggi_air + " cm";
    document.getElementById("water").innerText = d.water_level;

    let statusEl = document.getElementById("status");
    statusEl.innerText = d.status;

    statusEl.className = "status";

    let warna = "green";

    if(d.status == "WASPADA") {
      warna = "orange";
      statusEl.classList.add("waspada");
    }
    else if(d.status == "BAHAYA") {
      warna = "red";
      statusEl.classList.add("bahaya");
    }
    else {
      statusEl.classList.add("aman");
    }

    if(marker) map.removeLayer(marker);

    marker = L.circleMarker([d.latitude, d.longitude], {
      color: warna,
      radius: 12
    }).addTo(map)
    .bindPopup(
      "<b>Status:</b> " + d.status + "<br>" +
      "<b>Tinggi:</b> " + d.tinggi_air + " cm"
    );

  });
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
