<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM BOX */
.form-box {
  width:90%;
  max-width:500px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

/* TITLE */
.form-box h2 {
  text-align:center;
  margin-bottom:25px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group label {
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

.input-group input,
.input-group select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

/* METHOD */
.method {
  margin-top:20px;
  text-align:center;
}

.method p {
  margin-bottom:10px;
}

.method button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.google { background:white; }
.email { background:#eee; }
.hp { background:#ddd; }

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

  <div class="form-box">

    <h2>Daftar Akun FLOWS-PRO</h2>

    <form id="registerForm">

      <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" required placeholder="Masukkan nama lengkap">
      </div>

      <div class="input-group">
        <label>Tanggal Lahir</label>
        <input type="date" id="tgl" required>
      </div>

      <div class="input-group">
        <label>Lokasi Tempat Tinggal</label>
        <input type="text" id="lokasi" required placeholder="Contoh: Medan, Sumatera Utara">
      </div>

      <button type="submit" class="btn primary">Daftar Sekarang</button>

    </form>

    <div class="method">
      <p>Atau daftar menggunakan</p>
      <button class="google">Google</button>
      <button class="email">Email</button>
      <button class="hp">No HP</button>
    </div>

    <div class="link">
      <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
    </div>

  </div>

</div>

<script>

/* CEK SUDAH LOGIN */
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

/* REGISTER + AUTO LOGIN */
document.getElementById("registerForm").addEventListener("submit", function(e){

  e.preventDefault();

  const nama = document.getElementById("nama").value;
  const tgl = document.getElementById("tgl").value;
  const lokasi = document.getElementById("lokasi").value;

  const user = {
    name: nama,
    tgl: tgl,
    lokasi: lokasi,
    photo: "https://i.pravatar.cc/150"
  };

  // simpan sebagai user login
  localStorage.setItem("user", JSON.stringify(user));

  alert("Akun berhasil dibuat & langsung masuk dashboard!");

  // langsung ke dashboard
  window.location.href = "dashboard.html";

});

</script>

</body>
</html>
