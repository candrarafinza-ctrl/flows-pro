<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS PRO</title>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{height:100vh;overflow:hidden;}

body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* ===== CONTAINER ===== */
.container{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== BOX ===== */
.form-box{
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:20px;
  padding:40px;
  color:white;
}

.form-box h2{text-align:center;margin-bottom:25px;}

.input-group{margin-bottom:15px;}
.input-group input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary{background:#00c6ff;color:white;}

/* METHOD */
.method{text-align:center;margin-top:20px;}
.method button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.google{background:white;}
.email{background:#eee;}
.hp{background:#ddd;}

</style>
</head>

<body>

<div class="container">
<div class="form-box">

<h2>Daftar Akun FLOWS-PRO</h2>

<form id="form">
<input id="nama" placeholder="Nama lengkap" required>
<input id="tgl" type="date" required>
<input id="lokasi" placeholder="Lokasi" required>

<button class="btn primary">Daftar</button>
</form>

<div class="method">
<p>Atau daftar menggunakan</p>
<button class="google" onclick="googleLogin()">Google</button>
<button class="email" onclick="focusForm()">Email</button>
<button class="hp" onclick="startHP()">No HP</button>
</div>

</div>
</div>

<!-- OTP POPUP -->
<div id="otpBox" style="
position:fixed;
top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;
color:black;
padding:20px;
border-radius:12px;
display:none;
text-align:center;
">
  <h3>Verifikasi HP</h3>
  <p>Kode OTP: <b id="kodeOtp"></b></p>
  <input id="otpInput" placeholder="Masukkan OTP">
  <br><br>
  <button onclick="verifyOTP()">Verifikasi</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ===== AUTO LOGIN ===== */
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

/* ===== FORM ===== */
document.getElementById("form").addEventListener("submit",(e)=>{
  e.preventDefault();

  const user = {
    name: nama.value,
    tgl: tgl.value,
    lokasi: lokasi.value,
    photo:"https://i.pravatar.cc/150"
  };

  localStorage.setItem("user", JSON.stringify(user));
  window.location.href="dashboard.html";
});

/* ===== GOOGLE REAL ===== */
window.googleLogin = async ()=>{
  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("user", JSON.stringify({
      name:user.displayName,
      email:user.email,
      photo:user.photoURL
    }));

    window.location.href="dashboard.html";

  }catch(err){
    alert("Google gagal: "+err.message);
  }
};

/* ===== EMAIL ===== */
window.focusForm = ()=>{
  nama.focus();
};

/* ===== HP (OTP SIMULASI) ===== */
let otpCode;

window.startHP = ()=>{
  otpCode = Math.floor(100000 + Math.random()*900000);
  document.getElementById("kodeOtp").innerText = otpCode;
  document.getElementById("otpBox").style.display="block";
};

window.verifyOTP = ()=>{
  if(document.getElementById("otpInput").value == otpCode){

    const user = {
      name:"User HP",
      phone:"08123xxxx",
      photo:"https://i.pravatar.cc/150?img=5"
    };

    localStorage.setItem("user", JSON.stringify(user));
    window.location.href="dashboard.html";

  }else{
    alert("OTP salah!");
  }
};

</script>

</body>
</html>
