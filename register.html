<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Daftar</title>

<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#7b2ff7,#00c6ff);
}

.box {
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
}

input,button {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.hidden {
  display:none;
}

.google {
  background:red;
  color:white;
}

.email {
  background:#7b2ff7;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <h2>Daftar Akun</h2>

  <!-- INPUT NAMA -->
  <input type="text" id="nama" placeholder="Nama Anda">

  <!-- PILIH METODE -->
  <button onclick="showEmail()" class="email">
    Daftar dengan Email
  </button>

  <button onclick="loginGoogle()" class="google">
    Daftar / Masuk dengan Google
  </button>

  <!-- FORM EMAIL (MUNCUL SAAT DIKLIK) -->
  <div id="emailForm" class="hidden">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="registerEmail()">Submit Email</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  storageBucket: "flows-pro-dc80e.firebasestorage.app",
  messagingSenderId: "1013010002522",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// tampilkan form email
window.showEmail = function(){
  document.getElementById("emailForm").classList.remove("hidden");
}

// daftar email
window.registerEmail = function(){
  let nama = document.getElementById("nama").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      return updateProfile(userCredential.user, {
        displayName: nama
      });
    })
    .then(() => {
      alert("Berhasil daftar!");
      window.location = "dashboard.html";
    })
    .catch(err => alert(err.message));
}

// google login
const provider = new GoogleAuthProvider();

window.loginGoogle = function(){
  signInWithPopup(auth, provider)
    .then(() => {
      alert("Berhasil login Google!");
      window.location = "dashboard.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
