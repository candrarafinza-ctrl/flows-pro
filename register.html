<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM BOX */
.form-box {
  width:90%;
  max-width:500px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

/* TITLE */
.form-box h2 {
  text-align:center;
  margin-bottom:25px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group label {
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

.input-group input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

/* METHOD */
.method {
  margin-top:20px;
  text-align:center;
}

.method button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.method button:hover {
  transform:scale(1.05);
}

.google { background:white; }
.email { background:#eee; }
.hp { background:#ddd; }

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

  <div class="form-box">

    <h2>Daftar Akun FLOWS-PRO</h2>

    <form id="registerForm">

      <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" required>
      </div>

      <div class="input-group">
        <label>Tanggal Lahir</label>
        <input type="date" id="tgl" required>
      </div>

      <div class="input-group">
        <label>Lokasi</label>
        <input type="text" id="lokasi" required>
      </div>

      <button type="submit" class="btn primary">Daftar Sekarang</button>

    </form>

    <div class="method">
      <p>Atau daftar menggunakan</p>

      <button class="google" onclick="loginGoogle()">Google</button>
      <button class="email" onclick="focusForm()">Email</button>
      <button class="hp" onclick="loginHP()">No HP</button>
    </div>

    <div class="link">
      <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
    </div>

  </div>

</div>

<script>

/* AUTO LOGIN */
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

/* FORM REGISTER */
document.getElementById("registerForm").addEventListener("submit", function(e){

  e.preventDefault();

  const user = {
    name: document.getElementById("nama").value,
    tgl: document.getElementById("tgl").value,
    lokasi: document.getElementById("lokasi").value,
    photo: "https://i.pravatar.cc/150"
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Berhasil daftar!");
  window.location.href = "dashboard.html";
});

/* GOOGLE LOGIN (SIMULASI CEPAT) */
function loginGoogle(){

  const user = {
    name: "User Google",
    email: "google@gmail.com",
    photo: "https://i.pravatar.cc/150?img=3"
  };

  localStorage.setItem("user", JSON.stringify(user));

  window.location.href = "dashboard.html";
}

/* EMAIL BUTTON → FOKUS KE FORM */
function focusForm(){
  document.getElementById("nama").focus();
}

/* NO HP LOGIN (SIMULASI) */
function loginHP(){

  const user = {
    name: "User HP",
    phone: "08123456789",
    photo: "https://i.pravatar.cc/150?img=5"
  };

  localStorage.setItem("user", JSON.stringify(user));

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
