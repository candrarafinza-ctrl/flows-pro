<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS-PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #7b2ff7, #00c6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.email-btn {
  background: #7b2ff7;
  color: white;
}

.google-btn {
  background: #db4437;
  color: white;
  margin-top: 10px;
}

.link {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Daftar Akun</h2>

  <!-- EMAIL -->
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button class="email-btn" onclick="registerEmail()">Daftar dengan Email</button>

  <!-- GOOGLE -->
  <button class="google-btn" onclick="loginGoogle()">
    Daftar / Masuk dengan Google
  </button>

  <div class="link">
    Sudah punya akun? <a href="login.html">Masuk</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx...",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// EMAIL REGISTER
window.registerEmail = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Berhasil daftar!");
      window.location = "dashboard.html";
    })
    .catch(err => alert(err.message));
}

// GOOGLE (DAFTAR ATAU LOGIN)
const provider = new GoogleAuthProvider();

window.loginGoogle = function(){
  signInWithPopup(auth, provider)
    .then(() => {
      alert("Berhasil masuk dengan Google!");
      window.location = "dashboard.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
