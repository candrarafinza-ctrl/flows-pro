<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
  transition:0.4s;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM BOX */
.form-box {
  width:90%;
  max-width:500px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:20px;
  padding:40px;
  color:white;
  animation:fadeUp 0.8s ease;
}

/* TITLE */
.form-box h2 {
  text-align:center;
  margin-bottom:25px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group label {
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

.input-group input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

/* METHOD */
.method {
  margin-top:20px;
  text-align:center;
}

.method p {
  margin-bottom:10px;
}

.method button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.method button:hover {
  transform:scale(1.05);
}

/* ACTIVE BUTTON */
.method button.active {
  background:#00c6ff;
  color:white;
  transform:scale(1.1);
}

.google { background:white; color:black; }
.email { background:#eee; color:black; }

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* FORM ANIMATION */
.form-slide {
  transition:0.4s;
}

.hide {
  opacity:0;
  transform:translateX(-40px);
  pointer-events:none;
  position:absolute;
}

.show {
  opacity:1;
  transform:translateX(0);
  position:relative;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <div class="form-box">

    <h2>Daftar Akun FLOWS-PRO</h2>

    <form id="registerForm">

      <!-- DEFAULT -->
      <div id="defaultForm" class="form-slide show">

        <div class="input-group">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" required>
        </div>

        <div class="input-group">
          <label>Tanggal Lahir</label>
          <input type="date" id="tgl">
        </div>

        <div class="input-group">
          <label>Lokasi Tempat Tinggal</label>
          <input type="text" id="lokasi">
        </div>

      </div>

      <!-- EMAIL -->
      <div id="emailForm" class="form-slide hide">

        <div class="input-group">
          <label>Nama Lengkap</label>
          <input type="text" id="namaEmail">
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password">
        </div>

      </div>

      <button type="submit" class="btn primary">Daftar Sekarang</button>

    </form>

    <div class="method">
      <p>Atau daftar menggunakan</p>

      <button id="btnDefault" class="active" onclick="switchDefault()">Form</button>
      <button id="btnEmail" class="email" onclick="switchEmail()">Email</button>
      <button class="google" onclick="loginGoogle()">Google</button>
    </div>

    <div class="link">
      <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
    </div>

  </div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* MODE */
let mode = "default";

/* SWITCH EMAIL */
window.switchEmail = function(){

  mode = "email";

  defaultForm.classList.remove("show");
  defaultForm.classList.add("hide");

  emailForm.classList.remove("hide");
  emailForm.classList.add("show");

  btnEmail.classList.add("active");
  btnDefault.classList.remove("active");

  namaEmail.value = nama.value;
};

/* SWITCH DEFAULT */
window.switchDefault = function(){

  mode = "default";

  emailForm.classList.remove("show");
  emailForm.classList.add("hide");

  defaultForm.classList.remove("hide");
  defaultForm.classList.add("show");

  btnDefault.classList.add("active");
  btnEmail.classList.remove("active");
};

/* REGISTER */
registerForm.addEventListener("submit", async function(e){

  e.preventDefault();

  if(mode === "default"){

    localStorage.setItem("user", JSON.stringify({
      name: nama.value,
      tgl: tgl.value,
      lokasi: lokasi.value,
      photo:"https://i.pravatar.cc/150"
    }));

    smoothGo();

  } else {

    try{

      const cred = await createUserWithEmailAndPassword(
        auth,
        email.value,
        password.value
      );

      localStorage.setItem("user", JSON.stringify({
        name: namaEmail.value,
        email: cred.user.email,
        photo:"https://i.pravatar.cc/150"
      }));

      smoothGo();

    } catch(err){
      alert(err.message);
    }

  }

});

/* GOOGLE */
window.loginGoogle = async function(){

  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("user", JSON.stringify({
      name:user.displayName,
      email:user.email,
      photo:user.photoURL
    }));

    smoothGo();

  } catch(err){
    alert(err.message);
  }

};

/* TRANSISI */
function smoothGo(){
  document.body.style.opacity = "0";
  setTimeout(()=>{
    window.location.href = "dashboard.html";
  },400);
}

</script>

</body>
</html>
