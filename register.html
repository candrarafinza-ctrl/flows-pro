<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM BOX */
.form-box {
  width:90%;
  max-width:500px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

/* TITLE */
.form-box h2 {
  text-align:center;
  margin-bottom:25px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group label {
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

.input-group input,
.input-group select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

/* METHOD */
.method {
  margin-top:20px;
  text-align:center;
}

.method p {
  margin-bottom:10px;
}

.method button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.google { background:white; }
.email { background:#eee; }
.hp { background:#ddd; }

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

/* OTP BOX */
#otpBox {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:25px;
  border-radius:12px;
  display:none;
  text-align:center;
  z-index:999;
}

</style>
</head>

<body>

<div class="container">

  <div class="form-box">

    <h2>Daftar Akun FLOWS-PRO</h2>

    <form id="registerForm">

      <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" required placeholder="Masukkan nama lengkap">
      </div>

      <div class="input-group">
        <label>Tanggal Lahir</label>
        <input type="date" id="tgl" required>
      </div>

      <div class="input-group">
        <label>Lokasi Tempat Tinggal</label>
        <input type="text" id="lokasi" required placeholder="Contoh: Medan">
      </div>

      <button type="submit" class="btn primary">Daftar Sekarang</button>

    </form>

    <div class="method">
      <p>Atau daftar menggunakan</p>

      <button class="google" onclick="loginGoogle()">Google</button>
      <button class="email" onclick="focusForm()">Email</button>
      <button class="hp" onclick="startHP()">No HP</button>
    </div>

    <div class="link">
      <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
    </div>

  </div>

</div>

<!-- OTP POPUP -->
<div id="otpBox">
  <h3>Verifikasi Nomor HP</h3>
  <p>Kode OTP: <b id="otpCode"></b></p>
  <input id="otpInput" placeholder="Masukkan OTP">
  <br><br>
  <button onclick="verifyOTP()">Verifikasi</button>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* AUTO LOGIN */
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

/* FORM REGISTER */
document.getElementById("registerForm").addEventListener("submit", function(e){

  e.preventDefault();

  const user = {
    name: nama.value,
    tgl: tgl.value,
    lokasi: lokasi.value,
    photo: "https://i.pravatar.cc/150"
  };

  localStorage.setItem("user", JSON.stringify(user));
  window.location.href = "dashboard.html";
});

/* GOOGLE LOGIN (REAL) */
window.loginGoogle = async function(){
  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("user", JSON.stringify({
      name:user.displayName,
      email:user.email,
      photo:user.photoURL
    }));

    window.location.href="dashboard.html";

  }catch(err){
    alert(err.message);
  }
};

/* EMAIL */
window.focusForm = function(){
  document.getElementById("nama").focus();
};

/* HP OTP */
let otp;

window.startHP = function(){
  otp = Math.floor(100000 + Math.random()*900000);
  document.getElementById("otpCode").innerText = otp;
  document.getElementById("otpBox").style.display="block";
};

window.verifyOTP = function(){

  if(document.getElementById("otpInput").value == otp){

    const user = {
      name:"User HP",
      phone:"08xxxx",
      photo:"https://i.pravatar.cc/150?img=5"
    };

    localStorage.setItem("user", JSON.stringify(user));
    window.location.href="dashboard.html";

  } else {
    alert("OTP salah!");
  }
};

</script>

</body>
</html>
