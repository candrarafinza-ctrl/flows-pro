<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS-PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#7b2ff7,#00c6ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX (TIDAK DIHAPUS) */
.container {
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  animation:fadeIn 1s ease;
}

h2 {text-align:center;}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.email {background:#7b2ff7;color:white;}
.google {background:red;color:white;}

.hidden {display:none;}

@keyframes fadeIn {
  from {opacity:0;transform:translateY(20px);}
  to {opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h2>Daftar Akun</h2>

  <!-- NAMA -->
  <input type="text" id="nama" placeholder="Nama Anda">

  <!-- PILIH -->
  <button class="email" onclick="showEmail()">Daftar dengan Email</button>
  <button class="google" onclick="loginGoogle()">Daftar / Masuk Google</button>

  <!-- FORM EMAIL -->
  <div id="formEmail" class="hidden">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="registerEmail()">Submit Email</button>
  </div>

  <p style="text-align:center;">
    Sudah punya akun? <a href="login.html">Masuk</a>
  </p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  storageBucket: "flows-pro-dc80e.firebasestorage.app",
  messagingSenderId: "1013010002522",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.showEmail = function(){
  document.getElementById("formEmail").classList.remove("hidden");
}

window.registerEmail = function(){
  let nama = document.getElementById("nama").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth,email,password)
    .then((userCredential)=>{
      return updateProfile(userCredential.user,{
        displayName:nama
      });
    })
    .then(()=>window.location="dashboard.html")
    .catch(err=>alert(err.message));
}

const provider = new GoogleAuthProvider();

window.loginGoogle = function(){
  signInWithPopup(auth,provider)
    .then(()=>window.location="dashboard.html")
    .catch(err=>alert(err.message));
}
</script>

</body>
</html>
