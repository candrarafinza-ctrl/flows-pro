<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM BOX */
.form-box {
  width:90%;
  max-width:500px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

/* TITLE */
.form-box h2 {
  text-align:center;
  margin-bottom:25px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group label {
  font-size:14px;
  display:block;
  margin-bottom:5px;
}

.input-group input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

/* METHOD */
.method {
  margin-top:20px;
  text-align:center;
}

.method p {
  margin-bottom:10px;
}

.method button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.method button:hover {
  transform:scale(1.05);
}

.google { background:white; }
.email { background:#eee; }

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

  <div class="form-box">

    <h2>Daftar Akun FLOWS-PRO</h2>

    <!-- FORM -->
    <form id="registerForm">

      <!-- DEFAULT FORM -->
      <div id="defaultForm">

        <div class="input-group">
          <label>Nama Lengkap</label>
          <input type="text" id="nama" required>
        </div>

        <div class="input-group">
          <label>Tanggal Lahir</label>
          <input type="date" id="tgl">
        </div>

        <div class="input-group">
          <label>Lokasi Tempat Tinggal</label>
          <input type="text" id="lokasi">
        </div>

      </div>

      <!-- EMAIL FORM -->
      <div id="emailForm" style="display:none;">

        <div class="input-group">
          <label>Nama Lengkap</label>
          <input type="text" id="namaEmail">
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password">
        </div>

      </div>

      <button type="submit" class="btn primary">Daftar Sekarang</button>

    </form>

    <!-- METHOD -->
    <div class="method">
      <p>Atau daftar menggunakan</p>

      <button class="google" onclick="loginGoogle()">Google</button>
      <button class="email" onclick="switchEmail()">Email</button>
    </div>

    <!-- LINK -->
    <div class="link">
      <p>Sudah punya akun? <a href="login.html">Masuk</a></p>
    </div>

  </div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithPopup,
  GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* MODE */
let mode = "default";

/* SWITCH EMAIL */
window.switchEmail = function(){
  mode = "email";
  document.getElementById("defaultForm").style.display = "none";
  document.getElementById("emailForm").style.display = "block";
};

/* REGISTER */
document.getElementById("registerForm").addEventListener("submit", async function(e){

  e.preventDefault();

  if(mode === "default"){

    const user = {
      name: document.getElementById("nama").value,
      tgl: document.getElementById("tgl").value,
      lokasi: document.getElementById("lokasi").value,
      photo: "https://i.pravatar.cc/150"
    };

    localStorage.setItem("user", JSON.stringify(user));
    window.location.href = "dashboard.html";

  } else {

    try{
      const cred = await createUserWithEmailAndPassword(
        auth,
        document.getElementById("email").value,
        document.getElementById("password").value
      );

      localStorage.setItem("user", JSON.stringify({
        name: document.getElementById("namaEmail").value,
        email: cred.user.email,
        photo: "https://i.pravatar.cc/150"
      }));

      window.location.href = "dashboard.html";

    } catch(err){
      alert(err.message);
    }

  }

});

/* GOOGLE LOGIN */
window.loginGoogle = async function(){

  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("user", JSON.stringify({
      name: user.displayName,
      email: user.email,
      photo: user.photoURL
    }));

    window.location.href = "dashboard.html";

  } catch(err){
    alert(err.message);
  }

};

</script>

</body>
</html>
