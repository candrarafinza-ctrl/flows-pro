<!DOCTYPE html>
<html>
<head>
  <title>Login FLOWS PRO</title>
  <style>
    body {
      font-family: Arial;
      background: #0d47a1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 250px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #0d47a1;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>FLOWS PRO</h2>

  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="error" style="color:red;"></p>
</div>

<script>

function login() {

  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value.trim();

  console.log(user, pass); // DEBUG

  if(user === "admin" && pass === "12345") {

    localStorage.setItem("login", "true");

    window.location.href = "index.html";

  } else {
    document.getElementById("error").innerText = "Login gagal!";
  }

}

</script>

</body>
</html>
