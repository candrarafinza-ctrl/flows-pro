<!DOCTYPE html>
<html>
<head>
  <title>Login FLOWS PRO</title>

  <!-- CDN FIX -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d47a1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 260px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #3367d6;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login FLOWS PRO</h2>

  <button onclick="loginGoogle()">Login dengan Google</button>
</div>

<script>

// ⛔ PASTIKAN INI BENAR
const SUPABASE_URL = "https://hceblnmngnnexxtkeiev.supabase.co";
const SUPABASE_KEY = "ISI_ANON_KEY_KAMU";

// INIT CLIENT
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// LOGIN FUNCTION
async function loginGoogle() {

  console.log("Klik login"); // DEBUG

  const { data, error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + "/dashboard.html"
    }
  });

  if(error) {
    console.error(error);
    alert("Login error: " + error.message);
  }
}

</script>

</body>
</html>
