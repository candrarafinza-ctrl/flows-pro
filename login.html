<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FLOWS-PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #00c6ff, #7b2ff7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* BOX LOGIN (TETAP ADA) */
.container {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #00c6ff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0095cc;
}

/* LINK */
.link {
  text-align: center;
  margin-top: 10px;
}

.link a {
  text-decoration: none;
  color: #7b2ff7;
}

/* ANIMASI (TETAP ADA) */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h2>Masuk ke FLOWS-PRO</h2>

  <input type="email" id="username" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Masuk</button>

  <div class="link">
    Belum punya akun? <a href="register.html">Daftar</a>
  </div>
</div>

<!-- 🔥 FIREBASE + FITUR TAMBAHAN (TIDAK MENGHAPUS YANG LAMA) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  storageBucket: "flows-pro-dc80e.firebasestorage.app",
  messagingSenderId: "1013010002522",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN FUNCTION (DITAMBAH, BUKAN DIGANTI) */
window.login = function(){
  let email = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  if(email === "" || password === ""){
    alert("Harap isi email dan password!");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login berhasil!");
      window.location = "dashboard.html";
    })
    .catch(error => {
      alert(error.message);
    });
}
</script>

</body>
</html>
