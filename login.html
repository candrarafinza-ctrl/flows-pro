<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login FLOWS PRO</title>

<!-- SUPABASE -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
  animation: pageFade 1s ease;
}

/* ANIMASI MASUK HALAMAN */
@keyframes pageFade {
  from {
    opacity: 0;
  }
  to {
    opacity: 1;
  }
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('banjir.jpg') no-repeat center center/cover;
  filter: brightness(0.5) blur(3px);
  z-index: -2;
  animation: zoomBg 2s ease;
}

/* ANIMASI BACKGROUND */
@keyframes zoomBg {
  from {
    transform: scale(1.2);
  }
  to {
    transform: scale(1);
  }
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  z-index: -1;
}

/* CARD LOGIN */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(255,255,255,0.95);
  padding: 35px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: cardIn 1s ease forwards;
}

/* ANIMASI CARD */
@keyframes cardIn {
  to {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
}

/* TITLE */
.card h2 {
  margin-bottom: 20px;
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4285F4;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* HOVER */
.login-btn:hover {
  transform: scale(1.05);
  background: #3367d6;
}

/* CLICK */
.login-btn:active {
  transform: scale(0.95);
}

/* FOOTER TEXT */
.small {
  margin-top: 15px;
  font-size: 12px;
  color: #555;
}

/* RESPONSIVE */
@media(max-width:500px){
  .card {
    width: 90%;
    padding: 25px;
  }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card">
  <h2>Login FLOWS PRO</h2>

  <button class="login-btn" onclick="loginGoogle()">
    Login dengan Google
  </button>

  <div class="small">
    Sistem Monitoring Banjir Real-Time
  </div>
</div>

<script>

/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://hceblnmngnnexxtkeiev.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjZWJsbm1uZ25uZXh4dGtlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTc5MDQsImV4cCI6MjA5MTU3MzkwNH0.jRFevO_3qqjUpL3nNtYKqH-vExMabcnNzDYbThpJdjs";

const { createClient } = supabase;
const client = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ================= LOGIN ================= */
async function loginGoogle() {

  document.body.style.opacity = "0";
  document.body.style.transition = "0.4s";

  setTimeout(async () => {
    const { error } = await client.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + "/dashboard.html"
      }
    });

    if (error) {
      alert("Login gagal: " + error.message);
    }
  }, 400);
}

</script>

</body>
</html>
