<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#00c6ff,#7b2ff7);
  font-family:Arial;
}

.box {
  background:white;
  padding:30px;
  border-radius:15px;
  width:300px;
}

input,button {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.google {
  background:red;
  color:white;
}
</style>
</head>

<body>

<div class="box">
  <h2>Masuk</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="loginEmail()">Masuk dengan Email</button>

  <button class="google" onclick="loginGoogle()">
    Masuk dengan Google
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx...",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// EMAIL LOGIN
window.loginEmail = function(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(()=> window.location="dashboard.html")
    .catch(err=>alert(err.message));
}

// GOOGLE LOGIN
const provider = new GoogleAuthProvider();

window.loginGoogle = function(){
  signInWithPopup(auth, provider)
    .then(()=> window.location="dashboard.html")
    .catch(err=>alert(err.message));
}
</script>

</body>
</html>
