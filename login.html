<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
  background:#000;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.5);
  animation:zoomBg 6s ease forwards;
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BOX */
.box {
  width:90%;
  max-width:420px;

  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:25px;
  padding:45px;
  color:white;
  text-align:center;

  animation:fadeUp 1s ease;
}

/* TITLE */
.box h2 {
  margin-bottom:30px;
  font-size:24px;
}

/* BUTTON */
.btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  font-size:16px;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.btn:active {
  transform:scale(0.95);
}

/* LINK */
.link {
  margin-top:25px;
}

.link a {
  color:#fff;
  text-decoration:underline;
}

/* POPUP */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;
  color:black;
  padding:20px 30px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;
  z-index:999;
}

.popup.show {
  transform:translate(-50%,-50%) scale(1);
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes zoomBg {
  from {transform:scale(1.2);}
  to {transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">
  <div class="box">

    <h2>Masuk ke FLOWS-PRO</h2>

    <button class="btn" onclick="masuk()">Masuk</button>

    <div class="link">
      <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">Silakan daftar terlebih dahulu</div>

<script>

/* AUTO LOGIN */
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

/* POPUP FUNCTION */
function showPopup(){
  const popup = document.getElementById("popup");
  popup.classList.add("show");

  setTimeout(()=>{
    popup.classList.remove("show");
  },2000);
}

/* MASUK */
function masuk(){

  if(localStorage.getItem("user")){
    document.body.style.opacity = "0";

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    },500);

  } else {
    showPopup();

    setTimeout(()=>{
      window.location.href = "register.html";
    },2000);
  }

}

</script>

</body>
</html>
