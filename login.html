<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#00c6ff,#7b2ff7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  background:white;
  padding:30px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input,button {
  width:100%;
  padding:10px;
  margin:10px 0;
}

.google {background:red;color:white;}
</style>
</head>

<body>

<div class="container">
  <h2>Masuk</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="loginEmail()">Masuk Email</button>
  <button class="google" onclick="loginGoogle()">Masuk Google</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// AUTO LOGIN
onAuthStateChanged(auth,(user)=>{
  if(user) window.location="dashboard.html";
});

window.loginEmail = function(){
  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;

  signInWithEmailAndPassword(auth,email,password)
    .then(()=>window.location="dashboard.html")
    .catch(err=>alert(err.message));
}

const provider=new GoogleAuthProvider();

window.loginGoogle=function(){
  signInWithPopup(auth,provider)
    .then(()=>window.location="dashboard.html")
    .catch(err=>alert(err.message));
}
</script>

</body>
</html>
