<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BOX */
.box {
  width:90%;
  max-width:400px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

.box h2 {
  text-align:center;
  margin-bottom:20px;
}

/* INPUT */
.input-group {
  margin-bottom:15px;
}

.input-group input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary {
  background:#00c6ff;
  color:white;
}

.google {
  background:white;
  color:black;
}

/* LINK */
.link {
  text-align:center;
  margin-top:15px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <div class="box">

    <h2>Masuk ke FLOWS-PRO</h2>

    <!-- EMAIL LOGIN -->
    <div class="input-group">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn primary" onclick="loginEmail()">Masuk</button>

    <hr style="margin:20px 0; opacity:0.3;">

    <!-- GOOGLE LOGIN -->
    <button class="btn google" onclick="loginGoogle()">Masuk dengan Google</button>

    <div class="link">
      <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

  </div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyAfx674UeEZ0xFzXr0URPk-LP8CdMXWfE0",
  authDomain: "flows-pro-dc80e.firebaseapp.com",
  projectId: "flows-pro-dc80e",
  appId: "1:1013010002522:web:cb10af6a2b2592dcd09e63"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* ===== LOGIN EMAIL ===== */
window.loginEmail = async function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    localStorage.setItem("user", JSON.stringify({
      name: user.displayName || "User",
      email: user.email,
      photo: user.photoURL || "https://i.pravatar.cc/150"
    }));

    window.location.href = "dashboard.html";

  }catch(error){
    alert("Login gagal: " + error.message);
  }
};

/* ===== LOGIN GOOGLE ===== */
window.loginGoogle = async function(){

  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("user", JSON.stringify({
      name: user.displayName,
      email: user.email,
      photo: user.photoURL
    }));

    window.location.href = "dashboard.html";

  }catch(error){
    alert("Login gagal: " + error.message);
  }
};

</script>

</body>
</html>
