<!DOCTYPE html>
<html lang="id">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* BACKGROUND GAMBAR */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('banjir.jpg') no-repeat center center/cover;
  filter: brightness(0.6) blur(2px);
  z-index: -1;
  animation: zoomIn 2s ease;
}

/* ANIMASI BACKGROUND */
@keyframes zoomIn {
  from {
    transform: scale(1.2);
  }
  to {
    transform: scale(1);
  }
}

/* CARD LOGIN */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 16px;
  text-align: center;
  width: 320px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  animation: fadeUp 1s ease forwards;
}

/* ANIMASI MASUK */
@keyframes fadeUp {
  to {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
}

/* BUTTON */
button {
  background: #4285F4;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  background: #3367d6;
}

button:active {
  transform: scale(0.95);
}

h2 {
  margin-bottom: 20px;
}
</style>
</head>
