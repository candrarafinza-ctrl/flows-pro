<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FLOWS PRO</title>

<style>

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  height:100vh;
  overflow:hidden;
}

/* BACKGROUND */
body::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url('Desain tanpa judul (1).png') center/cover;
  filter:brightness(0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* BOX */
.box {
  width:90%;
  max-width:400px;

  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.3);

  border-radius:20px;
  padding:40px;
  color:white;

  animation:fadeUp 0.8s ease;
}

.box h2 {
  text-align:center;
  margin-bottom:25px;
}

/* BUTTON */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:#00c6ff;
  color:white;
}

/* LINK */
.link {
  text-align:center;
  margin-top:20px;
}

.link a {
  color:white;
}

/* ANIMASI */
@keyframes fadeUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <div class="box">

    <h2>Masuk ke FLOWS-PRO</h2>

    <button class="btn" onclick="masuk()">Masuk</button>

    <div class="link">
      <p>Belum punya akun? <a href="register.html">Daftar</a></p>
    </div>

  </div>
</div>

<script>

/* AUTO MASUK JIKA SUDAH DAFTAR */
if(localStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

/* TOMBOL MASUK */
function masuk(){

  if(localStorage.getItem("user")){
    // sudah punya akun
    window.location.href = "dashboard.html";
  } else {
    // belum punya akun
    alert("Silakan daftar terlebih dahulu!");
    window.location.href = "register.html";
  }

}

</script>

</body>
</html>
